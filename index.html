<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite School Tycoon - 模拟经营开发版</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent: #38bdf8;
            --t1-color: #f8fafc; /* 白色 */
            --t2-color: #3b82f6; /* 蓝色 */
            --t3-color: #a855f7; /* 紫色 */
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 状态看板 */
        #dashboard {
            width: 100%;
            background: var(--panel-bg);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat-box { text-align: center; min-width: 100px; }
        .stat-label { font-size: 12px; color: #94a3b8; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; color: #fbbf24; }

        /* 游戏主体容器 */
        #game-container {
            display: flex;
            padding: 20px;
            gap: 20px;
            max-width: 1400px;
        }

        /* 24地块棋盘 */
        #school-grid {
            display: grid;
            grid-template-columns: repeat(6, 130px);
            grid-template-rows: repeat(4, 130px);
            gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .plot {
            width: 130px;
            height: 130px;
            background: #0f172a;
            border: 2px dashed #475569;
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .plot:hover { border-color: var(--accent); background: #1e293b; }
        .plot.selected { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* 视觉进化样式 */
        .plot.tier-T1 { border: 2px solid var(--t1-color); color: var(--t1-color); }
        .plot.tier-T2 { border: 2px solid var(--t2-color); color: var(--t2-color); box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.3); }
        .plot.tier-T3 { border: 2px solid var(--t3-color); color: var(--t3-color); box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.4); font-weight: bold; }

        .plot-id { position: absolute; top: 5px; left: 5px; font-size: 10px; opacity: 0.5; }
        .plot-tier { position: absolute; bottom: 5px; right: 5px; font-size: 10px; background: rgba(0,0,0,0.5); padding: 2px 4px; border-radius: 3px; }

        /* 控制面板 */
        #side-panel {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        h3 { margin-top: 0; font-size: 16px; border-left: 4px solid var(--accent); padding-left: 10px; }

        .btn {
            background: #334155;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 4px;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn:hover { background: #475569; }
        .btn-build { background: #0369a1; }
        .btn-upgrade { background: #7e22ce; }
        .btn-action { background: #b45309; }
        .btn-semester { width: 100%; background: var(--success); font-weight: bold; font-size: 16px; margin-top: 10px; height: 50px; }

        input[type="range"], input[type="number"] { width: 100%; margin: 10px 0; }

        /* 日志窗口 */
        #event-log {
            height: 200px;
            background: #000;
            color: #10b981;
            font-family: 'Courier New', monospace;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            border: 1px solid #334155;
            border-radius: 8px;
        }

        /* 教师列表 */
        .teacher-item {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 5px 8px;
            margin: 4px 0;
            font-size: 12px;
            border-radius: 4px;
        }

        .alert { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="stat-box"><span class="stat-label">经费(w)</span><span id="funds" class="stat-value">50.00</span></div>
    <div class="stat-box"><span class="stat-label">名望</span><span id="reputation" class="stat-value">50</span></div>
    <div class="stat-box"><span class="stat-label">压力</span><span id="stress" class="stat-value">0</span>%</div>
    <div class="stat-box"><span class="stat-label">快乐值</span><span id="happiness" class="stat-value">50</span></div>
    <div class="stat-box"><span class="stat-label">教职</span><span id="teachers-count" class="stat-value">0</span>/6</div>
</div>

<div id="game-container">
    <div id="school-grid">
        </div>

    <div id="side-panel">
        <div class="control-group">
            <h3 id="selected-title">请选择地块</h3>
            <div id="build-menu">
                <button class="btn btn-build" onclick="build('Classroom')">普通教室 (10w)</button>
                <button class="btn btn-build" onclick="build('Lab')">科技实验室 (25w)</button>
                <button class="btn btn-build" onclick="build('ArtCenter')">艺术中心 (20w)</button>
                <button class="btn btn-upgrade" onclick="upgradeBuilding()">升级/进化建筑</button>
            </div>
        </div>

        <div class="control-group">
            <h3>师资与薪资</h3>
            <div id="teacher-list"></div>
            <button class="btn" onclick="hireTeacher()">招聘老师 (5w)</button>
            <div style="margin-top:10px; font-size:12px;">
                <span>薪资调整: </span>
                <button class="btn" onclick="adjustSalaries(500)">+500</button>
                <button class="btn" onclick="adjustSalaries(-500)">-500</button>
            </div>
        </div>

        <div class="control-group">
            <h3>策略设定</h3>
            <label class="stat-label">每生学费 (当前: <span id="tuition-val">5000</span>)</label>
            <input type="range" id="tuition-slider" min="2000" max="50000" step="1000" value="5000" oninput="updateTuition(this.value)">
            <button class="btn btn-action" onclick="runExchange()">国际交流团 (30w)</button>
            <button class="btn btn-action" onclick="improvePR()">媒体公关升级 (20w)</button>
            <button class="btn btn-action" onclick="buyLuxury()">购买奢侈品 (100w)</button>
        </div>

        <button class="btn btn-semester" onclick="runSemester()">开启新学期结算</button>

        <div id="event-log">
            > 系统就绪...<br>
            > 提示：必须有6间教室和6名老师才能开学。
        </div>
    </div>
</div>

<script>
    // --- 游戏配置与数据 ---
    let school = {
        funds: 50.00,
        reputation: 50,
        happiness: 50,
        baseStress: 0,
        tuition: 5000,
        prLevel: 1,
        selectedIdx: -1,
        plots: Array(24).fill(null).map((_, i) => ({
            id: i + 1,
            type: 'Empty',
            tier: 'T1',
            level: 0,
            capacity: 0
        })),
        teachers: [],
        names: ["张老师", "李老师", "王老师", "赵老师", "钱老师", "孙老师"]
    };

    const BUILDINGS = {
        'Classroom': { name: '标准教室', cost: 10, cap: 40, stress: 5 },
        'Lab': { name: 'AI算力中心', cost: 25, cap: 30, stress: 15 },
        'ArtCenter': { name: '琴房中心', cost: 20, cap: 25, stress: 8 },
        'Empty': { name: '荒地', cost: 0, cap: 0, stress: 0 }
    };

    // --- 初始化 ---
    function initGrid() {
        const gridEl = document.getElementById('school-grid');
        gridEl.innerHTML = '';
        school.plots.forEach((plot, index) => {
            const div = document.createElement('div');
            div.className = `plot tier-${plot.tier} ${school.selectedIdx === index ? 'selected' : ''}`;
            div.onclick = () => selectPlot(index);
            
            div.innerHTML = `
                <span class="plot-id">#${plot.id}</span>
                <div style="font-size:14px">${plot.type === 'Empty' ? '待开发' : BUILDINGS[plot.type].name}</div>
                ${plot.level > 0 ? `<div style="font-size:11px">Lv.${plot.level}</div>` : ''}
                <span class="plot-tier">${plot.tier}</span>
            `;
            gridEl.appendChild(div);
        });
        updateDashboard();
    }

    function selectPlot(index) {
        school.selectedIdx = index;
        const plot = school.plots[index];
        document.getElementById('selected-title').innerText = `地块 #${plot.id} - ${plot.type === 'Empty' ? '空地' : BUILDINGS[plot.type].name}`;
        initGrid();
    }

    function updateDashboard() {
        document.getElementById('funds').innerText = school.funds.toFixed(2);
        document.getElementById('reputation').innerText = school.reputation;
        document.getElementById('happiness').innerText = school.happiness;
        document.getElementById('teachers-count').innerText = school.teachers.length;
        
        let totalStress = school.baseStress;
        school.plots.forEach(p => { if(p.type !== 'Empty') totalStress += BUILDINGS[p.type].stress * p.level; });
        document.getElementById('stress').innerText = Math.min(100, totalStress);

        // 更新教师列表
        const tList = document.getElementById('teacher-list');
        tList.innerHTML = school.teachers.map(t => `
            <div class="teacher-item">
                <span>${t.name}</span>
                <span>士气: ${t.morale} | 薪资: ${t.salary}</span>
            </div>
        `).join('');
    }

    // --- 核心功能 ---
    function build(type) {
        if (school.selectedIdx === -1) return addLog("请先选择地块", "yellow");
        let cost = BUILDINGS[type].cost;
        if (school.funds < cost) return addLog("资金不足！", "red");

        school.funds -= cost;
        school.plots[school.selectedIdx] = {
            ...school.plots[school.selectedIdx],
            type: type,
            level: 1,
            tier: 'T1',
            capacity: BUILDINGS[type].cap
        };
        addLog(`建设了 ${BUILDINGS[type].name}`, "white");
        initGrid();
    }

    function upgradeBuilding() {
        if (school.selectedIdx === -1) return;
        let plot = school.plots[school.selectedIdx];
        if (plot.type === 'Empty') return;

        let upgradeCost = plot.level * 15;
        if (school.funds < upgradeCost) return addLog("升级资金不足！", "red");

        school.funds -= upgradeCost;
        plot.level++;
        
        // 视觉进化逻辑
        if (plot.level >= 3 && plot.tier === 'T1') plot.tier = 'T2';
        if (plot.level >= 6 && plot.tier === 'T2') plot.tier = 'T3';
        
        plot.capacity = Math.floor(plot.capacity * 1.5);
        addLog(`地块 #${plot.id} 升级完成，当前 Lv.${plot.level}`, "#a855f7");
        initGrid();
    }

    function hireTeacher() {
        if (school.teachers.length >= 6) return addLog("招聘名额已满！");
        if (school.funds < 5) return addLog("没钱招人了！");
        
        school.funds -= 5;
        school.teachers.push({
            name: school.names[school.teachers.length],
            salary: 5000,
            morale: 100
        });
        updateDashboard();
        addLog("新老师入职。");
    }

    function adjustSalaries(amount) {
        school.teachers.forEach(t => {
            t.salary = Math.max(2000, t.salary + amount);
            t.morale = Math.min(100, t.morale + (amount > 0 ? 5 : -10));
        });
        updateDashboard();
        addLog(`全体薪资调整了 ${amount}`);
    }

    function updateTuition(val) {
        school.tuition = val;
        document.getElementById('tuition-val').innerText = val;
    }

    // --- 模拟经营深度逻辑 ---
    function runSemester() {
        // 门槛检查
        let classroomCount = school.plots.filter(p => p.type !== 'Empty').length;
        if (classroomCount < 6 || school.teachers.length < 6) {
            return addLog("！！！无法开学：需6间教室和6位老师！！！", "red");
        }

        addLog(">>> 新学期结算中...", "#22c55e");

        // 1. 收入与支出
        let totalStudents = school.plots.reduce((sum, p) => sum + p.capacity, 0);
        let revenue = (totalStudents * school.tuition) / 10000; // 换算成 w
        let expense = school.teachers.reduce((sum, t) => sum + t.salary, 0) / 10000;
        
        school.funds += (revenue - expense);

        // 2. 学费博弈：高额查处风险
        // 风险公式：(学费/5000) * (100/名望) * 概率
        let auditRisk = (school.tuition / 5000) * (100 / (school.reputation + 1)) * 0.1;
        if (Math.random() < auditRisk) {
            let fine = revenue * 3; // 三倍罚款
            school.funds -= fine;
            school.reputation -= 20;
            addLog(`【政府查处】学费定价过高，重罚 ${fine.toFixed(2)}w！`, "red");
        }

        // 3. 负面事件：压力导致的自杀丑闻
        let currentStress = parseInt(document.getElementById('stress').innerText);
        if (currentStress > 80 && Math.random() > 0.5) {
            addLog("【重大危机】由于压力过大，发生学生极端事件！", "red");
            let silenceFee = 50 / school.prLevel; // 公关等级越高，封口费越低
            if (school.funds >= silenceFee) {
                school.funds -= silenceFee;
                addLog(`支付封口费 ${silenceFee.toFixed(2)}w，勉强压住媒体。`, "yellow");
            } else {
                alert("资金不足以支付封口费，媒体曝光，学校被迫倒闭！ GAME OVER");
                location.reload();
            }
        }

        // 4. 教师动态
        school.teachers.forEach(t => {
            if (currentStress > 70) t.morale -= 15;
            if (t.morale < 20) {
                addLog(`警告：${t.name} 因压力过大辞职了！`, "red");
                school.teachers = school.teachers.filter(teacher => teacher !== t);
            }
        });

        // 5. 失败判定
        if (school.reputation <= 0 || school.funds < -100) {
            alert("学校经营失败（名望清零或巨额负债）！ GAME OVER");
            location.reload();
        }

        updateDashboard();
        addLog(`结算完毕：净收益 ${(revenue - expense).toFixed(2)}w`);
    }

    // --- 扩展功能 ---
    function runExchange() {
        if (school.funds < 30) return;
        school.funds -= 30;
        school.reputation += 25;
        addLog("举办国际交流活动，名望大幅提升。");
        updateDashboard();
    }

    function improvePR() {
        if (school.funds < 20) return;
        school.funds -= 20;
        school.prLevel++;
        addLog("公关团队升级：现在降低了负面事故的处理费用。");
    }

    function buyLuxury() {
        if (school.funds < 100) return addLog("你现在还不配拥有奢侈品。");
        school.funds -= 100;
        school.happiness += 40;
        addLog("购买了纯金校舍，校长的笑容逐渐放肆。");
        updateDashboard();
    }

    function addLog(msg, color) {
        const log = document.getElementById('event-log');
        log.innerHTML += `<div style="color:${color || '#10b981'}">> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    // 启动
    initGrid();
</script>

</body>
</html>
