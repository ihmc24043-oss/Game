<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传奇校长：终极模拟器 (完整整合版)</title>
    <style>
        :root { --p-blue: #3498db; --p-red: #e74c3c; --p-gold: #f1c40f; --p-dark: #2c3e50; --p-green: #27ae60; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 120px; user-select: none; }
        
        /* 状态栏 - iPad/iPhone 适配 */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: var(--p-dark); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; font-size: 11px; }
        .stats-bar div span { display: block; color: var(--p-gold); font-size: 14px; font-weight: bold; }

        /* 24地块网格 */
        .campus-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; background: #ddd; margin: 10px; border-radius: 12px; }
        .slot { aspect-ratio: 1/1; background: #eee; border: 2px dashed #bbb; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #777; overflow: hidden; position: relative; text-align: center; }
        .slot.built { border: 2px solid var(--p-blue); background: white; color: #333; font-weight: bold; }
        .slot.large { grid-column: span 2; aspect-ratio: auto; min-height: 85px; border: 2px solid var(--p-gold); }
        .slot.hidden { display: none; }
        .lv-tag { position: absolute; top: 2px; right: 2px; background: var(--p-blue); color: white; padding: 1px 4px; border-radius: 4px; font-size: 8px; }

        /* 面板设计 */
        .section-title { font-size: 16px; font-weight: bold; margin: 15px 10px 5px; border-left: 4px solid var(--p-blue); padding-left: 10px; display: flex; justify-content: space-between; align-items: center; }
        .scroll-row { display: flex; overflow-x: auto; gap: 10px; padding: 5px 10px 15px; }
        .card { min-width: 140px; background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex-shrink: 0; border: 1px solid #eee; text-align: center; }
        
        /* 底部控制中心 */
        .controls { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; padding: 10px 0; display: flex; flex-direction: column; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 999; }
        .mode-toggles { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-mode { padding: 6px 12px; font-size: 11px; border-radius: 20px; border: 1px solid #ccc; background: white; }
        .btn-mode.active { background: var(--p-blue); color: white; border-color: var(--p-blue); }
        .btn-next { width: 90%; padding: 15px; background: var(--p-dark); color: var(--p-gold); border: none; border-radius: 30px; font-size: 18px; font-weight: bold; }

        /* 日志窗口 */
        #log { background: #2c3e50; color: #2ecc71; padding: 10px; height: 80px; overflow-y: auto; font-family: monospace; font-size: 10px; margin: 0 10px; border-radius: 8px; }
        
        /* 弹窗升级 */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 85%; max-height: 80vh; padding: 20px; border-radius: 20px; z-index: 2000; display: none; box-shadow: 0 0 50px rgba(0,0,0,0.3); overflow-y: auto; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; display: none; }
        .build-item { padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #fff; text-align: left; }
        .cat-title { grid-column: span 2; font-size: 12px; color: #888; margin-top: 10px; background: #f8f9fa; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="stats-bar">
    <div>资金<span id="money">¥1.0M</span></div>
    <div>学生压力<span id="pressure">0%</span></div>
    <div>声望<span id="reputation">60</span></div>
    <div>学生<span id="students">20/20</span></div>
    <div>学期<span id="round">1</span></div>
    <div>加成<span id="buff">100%</span></div>
</div>

<div id="log">系统：欢迎，校长。你需要至少6间教室和6名老师才能开始。</div>

<div class="section-title">校园规划 (24地块) <span style="font-size:10px; color:#999;">点击空地建造/点击建筑升级</span></div>
<div class="campus-grid" id="campus-grid"></div>

<div class="section-title">人才市场 <button onclick="refreshMarket()" style="font-size:10px;">刷新</button></div>
<div class="scroll-row" id="teacher-market"></div>

<div class="section-title">科研与升级 (Research)</div>
<div class="scroll-row" id="research-panel"></div>

<div class="section-title">全球研学 (Global Tour)</div>
<div class="scroll-row" id="tour-panel"></div>

<div class="section-title">校长办公室 (Principal Office)</div>
<div class="scroll-row">
    <div class="card">
        <h4>学费调整</h4>
        <input type="range" id="fee-range" min="1000" max="100000" value="5000" style="width:100%">
        <p id="fee-val">¥5,000/期</p>
    </div>
    <div class="card"><h4>家长捐赠</h4><button onclick="askParents()">发起筹款</button></div>
    <div class="card"><h4>媒体公关</h4><button onclick="doPR()">花费 ¥50k</button></div>
    <div class="card"><h4>放假</h4><button onclick="take hoilday()"
</div>

<div class="section-title">校长奢侈品 (Happy)</div>
<div class="scroll-row" id="luxury-panel"></div>

<div class="controls">
    <div class="mode-toggles">
        <button class="btn-mode active" id="mode-1" onclick="setMode(1)">佛系教育</button>
        <button class="btn-mode" id="mode-2" onclick="setMode(2)">标准模式</button>
        <button class="btn-mode" id="mode-3" onclick="setMode(3)">应试魔鬼</button>
    </div>
    <button class="btn-next" onclick="nextRound()">🔔 结束学期 / 进入下一天</button>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <h3 id="modal-title">建造设施</h3>
    <div id="modal-content" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
    <button onclick="closeModal()" style="width:100%; margin-top:20px; padding:12px; background:#eee; border:none; border-radius:10px; font-weight:bold;">关闭</button>
</div>

<script>
// --- 整合版数据库 ---
const ROOM_DATABASE = {
    "核心教学": {
        std_class: { name: "标准教室", cost: 30000, study: 10, pressure: 5, size: 1 },
        lang_lab: { name: "语言实验室", cost: 60000, study: 18, pressure: 3, size: 1 },
        math_sem: { name: "数学研讨室", cost: 55000, study: 22, pressure: 8, size: 1 }
    },
    "科学技术": {
        phy_lab: { name: "物理实验室", cost: 85000, study: 25, pressure: 10, size: 1 },
        chem_lab: { name: "化学实验室", cost: 90000, study: 28, pressure: 12, size: 1 },
        comp_lab: { name: "计算机房", cost: 120000, study: 35, pressure: 5, size: 1 },
        maker_space: { name: "创客空间", cost: 150000, study: 45, pressure: -5, size: 1 }
    },
    "艺术体育": {
        music_room: { name: "音乐教室", cost: 85000, study: 15, pressure: -15, size: 1 },
        dance_studio: { name: "舞蹈教室", cost: 100000, study: 20, pressure: -10, size: 1 },
        gym: { name: "体育馆", cost: 400000, study: 15, pressure: -25, size: 2 },
        pool: { name: "游泳馆", cost: 450000, study: 10, pressure: -20, size: 2 }
    },
    "高级空间": {
        library: { name: "图书馆", cost: 250000, study: 40, pressure: -10, size: 2 },
        auditorium: { name: "大礼堂", cost: 500000, study: 5, reputation: 50, size: 2 },
        dorm: { name: "豪华宿舍", cost: 150000, capacity: 60, size: 1 }
    }
};

const SKILLS = [
    { id: 'speech', name: "演讲大师", cost: 50000, desc: "提高筹款成功率" },
    { id: 'shield', name: "厚脸皮", cost: 80000, desc: "降低封口费金额" },
    { id: 'media', name: "媒体控制", cost: 120000, desc: "政府补助+50%" }
];

const TOURS = [
    { name: "硅谷科技团", cost: 200000, study: 50, rep: 20 },
    { name: "伦敦艺术展", cost: 150000, study: 30, rep: 40 },
    { name: "非洲志愿者", cost: 100000, study: 10, rep: 80 }
];

const LUXURY = [
    { name: "私人停机坪", cost: 500000 },
    { name: "纯金校长像", cost: 200000 }
];

// --- 游戏状态 ---
let state = {
    money: 1000000, pressure: 0, reputation: 60, students: 20, capacity: 20,
    round: 1, mode: 1, fee: 5000, buff: 1.0,
    slots: Array(24).fill(null), teachers: [], skills: []
};

function init() {
    renderGrid();
    refreshMarket();
    renderResearch();
    renderTours();
    renderLuxury();
    updateUI();
    document.getElementById('fee-range').oninput = function() {
        state.fee = parseInt(this.value);
        document.getElementById('fee-val').innerText = `¥${state.fee.toLocaleString()}/期`;
    };
}

// 24地块逻辑整合
function renderGrid() {
    const grid = document.getElementById('campus-grid');
    grid.innerHTML = '';
    state.slots.forEach((s, i) => {
        const d = document.createElement('div');
        if(s && s.isPart) { d.className = 'slot hidden'; }
        else if(s) {
            d.className = 'slot built' + (s.size == 2 ? ' large' : '');
            d.innerHTML = `<span class="lv-tag">Lv.${s.lv}</span><b>${s.name}</b>`;
            d.onclick = () => openUpgradeModal(i);
        } else {
            d.className = 'slot';
            d.innerHTML = '+';
            d.onclick = () => openBuildModal(i);
        }
        grid.appendChild(d);
    });
}

function openBuildModal(idx) {
    const content = document.getElementById('modal-content');
    document.getElementById('modal-title').innerText = "建造新设施";
    content.innerHTML = '';
    for (let cat in ROOM_DATABASE) {
        content.innerHTML += `<div class="cat-title">${cat}</div>`;
        for (let key in ROOM_DATABASE[cat]) {
            let r = ROOM_DATABASE[cat][key];
            let canFit = !(r.size == 2 && (idx % 4 == 3 || state.slots[idx+1]));
            content.innerHTML += `
                <button class="build-item" onclick="build(${idx},'${cat}','${key}')" ${!canFit?'disabled style="opacity:0.3"':''}>
                    <b>${r.name} ${r.size==2?'(双格)':''}</b><br>
                    <span style="color:#e67e22;font-size:10px;">¥${r.cost.toLocaleString()}</span>
                </button>`;
        }
    }
    showModal();
}

function build(idx, cat, key) {
    let r = ROOM_DATABASE[cat][key];
    if(state.money >= r.cost) {
        state.money -= r.cost;
        state.slots[idx] = { ...r, lv: 1, typeKey: key, catKey: cat };
        if(r.size == 2) state.slots[idx+1] = { isPart: true, parent: idx };
        if(r.capacity) state.capacity += r.capacity;
        addLog(`成功建造：${r.name}`);
        closeModal(); renderGrid(); updateUI();
    } else alert("经费不足！");
}

function openUpgradeModal(idx) {
    let s = state.slots[idx];
    if(s.isPart) { idx = s.parent; s = state.slots[idx]; }
    const upCost = Math.floor(s.cost * 1.5 * s.lv);
    const content = document.getElementById('modal-content');
    document.getElementById('modal-title').innerText = "设施管理";
    content.innerHTML = `
        <div style="grid-column: span 2; text-align:center; padding:20px;">
            <h4>${s.name} (等级 ${s.lv})</h4>
            <p>教学质量: ${Math.floor(s.study)}</p>
            <button onclick="upgrade(${idx}, ${upCost})" style="width:100%; padding:15px; background:var(--p-gold); border:none; border-radius:10px; font-weight:bold;">
                支付 ¥${upCost.toLocaleString()} 升级
            </button>
        </div>
    `;
    showModal();
}

function upgrade(idx, cost) {
    if(state.money >= cost) {
        state.money -= cost;
        state.slots[idx].lv++;
        state.slots[idx].study *= 1.3;
        addLog(`${state.slots[idx].name} 升级到了 Lv.${state.slots[idx].lv}`);
        closeModal(); renderGrid(); updateUI();
    } else alert("资金不足！");
}

// 核心结算逻辑
function nextRound() {
    const builtCount = state.slots.filter(s => s && !s.isPart).length;
    if(builtCount < 6 || state.teachers.length < 6) {
        return alert("【无法开业】你至少需要6间教室和6名老师！");
    }

    // 计算
    let tPower = state.teachers.reduce((s, t) => s + t.power, 0);
    let rStudy = state.slots.reduce((s, r) => s + (r && r.study ? r.study : 0), 0);
    let rPress = state.slots.reduce((s, r) => s + (r && r.pressure ? r.pressure : 0), 0);
    
    let modeMult = [0.5, 1, 2.5][state.mode-1];
    let studyEff = (tPower + rStudy) * modeMult * state.buff;
    let pressEff = (rPress + (studyEff/5)) * modeMult;

    state.pressure = Math.max(0, Math.min(100, state.pressure + pressEff));
    state.reputation += (studyEff / 60);
    
    // 财务结算
    let income = state.students * state.fee;
    let salaries = state.teachers.reduce((s, t) => s + t.salary, 0);
    let subsidy = state.reputation * (state.skills.includes('media') ? 750 : 500);
    
    state.money += (income + subsidy - salaries);
    
    // 事件判定
    if(state.pressure > 85 && Math.random() > 0.6) handleTragedy();
    if((state.fee > 80000 || state.reputation < 15) && Math.random() > 0.7) handleGovCheck();

    // 招生毕业
    if(state.round % 4 === 0) {
        let grads = Math.floor(state.students * 0.8);
        state.money += grads * (studyEff * 8);
        state.students -= grads;
        addLog(`🎓 学期末：${grads} 名学生毕业。`);
    }
    state.students = Math.min(state.capacity, state.students + Math.floor(state.reputation/3));
    
    state.round++;
    updateUI();
    if(state.money < 0) { alert("你破产了，校长！"); location.reload(); }
    // 每回合自然减压逻辑补丁
const originalNextRound = nextRound;
nextRound = function() {
    // 检查是否有特殊减压建筑
    let relaxBonus = state.slots.reduce((sum, s) => {
        return sum + (s && s.pressure < 0 ? Math.abs(s.pressure) * s.lv : 0);
    }, 0);
    
    // 执行原结算
    originalNextRound();
    
    // 结算后额外应用建筑减压 buff
    if(relaxBonus > 0) {
        state.pressure = Math.max(0, state.pressure - (relaxBonus / 10));
        addLog(`🧘 校园环境（减压设施）发挥作用，额外缓解了压力。`);
        updateUI();
    }
};

}

// 基础辅助功能
function refreshMarket() {
    const row = document.getElementById('teacher-market'); row.innerHTML = '';
    const names = ["Sarah", "李老师", "张博士", "美玲", "王教授", "老陈"];
    for(let i=0; i<4; i++){
        let sal = 2500 + Math.floor(Math.random()*2500);
        let pwr = Math.floor(sal / 100);
        let n = names[Math.floor(Math.random()*names.length)];
        row.innerHTML += `<div class="card"><h4>${n}</h4><p>月薪:¥${sal}</p><p>能力:${pwr}</p><button onclick="hireTeacher('${n}',${sal},${pwr})">聘用</button></div>`;
    }
}
function hireTeacher(n,s,p) { state.teachers.push({name:n,salary:s,power:p}); addLog(`聘请了 ${n}`); updateUI(); }
function handleTragedy() {
    let bribe = state.skills.includes('shield') ? 50000 : 200000;
    if(confirm(`🚨 学生压力爆表！支付 ¥${bribe.toLocaleString()} 压下丑闻？`)) {
        state.money -= bribe; state.reputation -= 10; addLog("丑闻已被封锁。");
    } else { state.reputation -= 60; addLog("负面新闻曝光！声望暴跌！"); }
}
function askParents() {
    let amt = parseInt(prompt("赞助费金额：", "10000"));
    if(!amt) return;
    if(Math.random() < (state.skills.includes('speech') ? 0.8 : 0.4)) {
        state.money += amt * state.students; addLog("筹款成功！");
    } else { state.reputation -= 15; addLog("筹款失败且被举报。"); }
    updateUI();
}
function handleGovCheck() {
    alert("🚨 政府突击检查！");
    if(state.pressure > 75 || state.fee > 60000) {
        state.money -= 150000; state.reputation -= 20; addLog("检查未通过，巨额罚款！");
    } else addLog("有惊无险，检查通过。");
}
function renderResearch() {
    const row = document.getElementById('research-panel');
    SKILLS.forEach(s => row.innerHTML += `<div class="card"><h4>${s.name}</h4><p>${s.desc}</p><button onclick="buySkill('${s.id}',${s.cost})">研制 ¥${s.cost/1000}k</button></div>`);
}
function buySkill(id, cost) {
    if(state.money >= cost && !state.skills.includes(id)) {
        state.money -= cost; state.skills.push(id); addLog(`技能解锁：${id}`); updateUI();
    }
}
function renderTours() {
    const row = document.getElementById('tour-panel');
    TOURS.forEach(t => row.innerHTML += `<div class="card"><h4>${t.name}</h4><p>¥${t.cost/1000}k</p><button onclick="goTour(${t.cost},${t.study},${t.rep})">启程</button></div>`);
}
function goTour(c,s,r) {
    if(state.money >= c) { state.money -= c; state.reputation += r; state.pressure = Math.max(0, state.pressure - 20); addLog("研学归来，全校士气大振。"); updateUI(); }
}
function renderLuxury() {
    const row = document.getElementById('luxury-panel');
    LUXURY.forEach(l => row.innerHTML += `<div class="card"><h4>${l.name}</h4><button onclick="buyLux('${l.name}',${l.cost})">¥${l.cost/1000}k</button></div>`);
}
function buyLux(n,c) { if(state.money >= c) { state.money -= c; addLog(`校长购买了 ${n}，非常享受！`); updateUI(); } }
function doPR() { if(state.money >= 50000) { state.money -= 50000; state.reputation += 20; updateUI(); addLog("公关活动提升了学校名气。"); } }
function setMode(m) { state.mode = m; document.querySelectorAll('.btn-mode').forEach((b,i) => b.className = (i+1===m)?'btn-mode active':'btn-mode'); }
function addLog(msg) { const l = document.getElementById('log'); l.innerHTML = `> ${msg}<br>` + l.innerHTML; }
function updateUI() {
    document.getElementById('money').innerText = `¥${(state.money/10000).toFixed(1)}w`;
    document.getElementById('pressure').innerText = `${Math.floor(state.pressure)}%`;
    document.getElementById('reputation').innerText = Math.floor(state.reputation);
    document.getElementById('students').innerText = `${state.students}/${state.capacity}`;
    document.getElementById('round').innerText = state.round;
    document.getElementById('buff').innerText = `${Math.floor(state.buff * 100)}%`;
}
function showModal() { document.getElementById('modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

window.onload = init;
// --- 修复补丁：强制找回升级模块与媒体逻辑 ---

/**
 * 1. 修复地块点击：自动判断是“建造”还是“升级”
 * 此函数会覆盖原有的渲染逻辑中对 onclick 的定义
 */
const originalRenderCampus = renderCampus; 
renderCampus = function() {
    originalRenderCampus(); // 先执行原有的渲染
    const slots = document.querySelectorAll('.slot');
    slots.forEach((div, i) => {
        div.onclick = () => {
            if (state.slots[i]) {
                // 如果格子里有东西，强制打开升级弹窗
                openUpgradeModal(i);
            } else {
                // 如果是空地，打开建造弹窗
                openBuildModal(i);
            }
        };
    });
};

/**
 * 2. 补全缺失的升级模块逻辑 (Upgrade Modal)
 */
function openUpgradeModal(index) {
    let s = state.slots[index];
    if(s.isPart) { index = s.parent; s = state.slots[index]; }
    
    const upCost = Math.floor((s.cost || 50000) * 1.5 * (s.lv || 1));
    const modal = document.getElementById('modal');
    const content = document.getElementById('modal-content');
    
    document.getElementById('modal-title').innerText = "设施管理与升级";
    content.style.display = "block"; // 确保不是网格布局，方便显示升级信息
    content.innerHTML = `
        <div style="text-align:center; padding:10px;">
            <h2 style="color:var(--p-blue);">${s.name}</h2>
            <p>当前等级：<b style="font-size:20px;">Lv.${s.lv}</b></p>
            <p>升级消耗：<span style="color:var(--p-red); font-weight:bold;">¥${upCost.toLocaleString()}</span></p>
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; font-size:12px; margin:10px 0;">
                升级后将提升 30% 的教学产出并增加学校声望。
            </div>
            <button onclick="executeUpgrade(${index}, ${upCost})" style="width:100%; padding:15px; background:var(--p-gold); border:none; border-radius:10px; font-weight:bold; font-size:16px; box-shadow:0 4px 0 #d4ac0d;">
                立即支付并升级
            </button>
        </div>
    `;
    modal.style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
}

/**
 * 3. 执行具体的升级动作
 */
function executeUpgrade(index, cost) {
    if (state.money >= cost) {
        state.money -= cost;
        state.slots[index].lv++;
        if(state.slots[index].study) state.slots[index].study *= 1.3;
        addLog(`✨ 升级成功！${state.slots[index].name} 已升至 Lv.${state.slots[index].lv}`);
        closeModal();
        renderCampus();
        updateUI();
    } else {
        alert("校长，经费不足以支持升级！");
    }
}

/**
 * 4. 修复媒体玩法：确保媒体公关逻辑存在
 * 如果你原本的 doPR 报错或失效，这里进行重写
 */
window.doPR = function() {
    const prCost = 50000;
    if (state.money >= prCost) {
        state.money -= prCost;
        state.reputation += 15;
        state.pressure = Math.max(0, state.pressure - 10);
        addLog("📢 媒体公关：成功引导舆论，名望提升，压力缓解。");
        updateUI();
    } else {
        alert("钱不够开新闻发布会了...");
    }
};

// 重新初始化一次，确保补丁生效
renderCampus();
/* --- 模式系统重做：佛系减压版 --- */

// 1. 强制重写模式切换逻辑
window.setMode = function(m) {
    state.mode = m;
    
    // 更新按钮视觉效果
    document.querySelectorAll('.btn-mode').forEach((btn, index) => {
        btn.classList.toggle('active', index + 1 === m);
    });

    // 模式切换即时反馈
    const modes = [
        { name: "佛系教育", desc: "大幅减缓压力，学生心情愉悦（产出降低）", color: "#27ae60" },
        { name: "标准模式", desc: "平衡发展，各数值中规中矩", color: "#3498db" },
        { name: "应试魔鬼", desc: "极限提升教学质量，但学生压力会暴增！", color: "#e74c3c" }
    ];
    
    addLog(`📢 政策调整：<span style="color:${modes[m-1].color}; font-weight:bold;">${modes[m-1].name}</span> - ${modes[m-1].desc}`);
    updateUI();
};

// 2. 核心：重写结算逻辑中的压力计算 (补丁挂载)
// 这里的逻辑会根据 state.mode 动态调整压力
const originalNextRoundForMode = nextRound;
nextRound = function() {
    // 在结算前，根据当前模式设置一个“压力系数”
    // 佛系(1): 0.3倍压力 | 标准(2): 1.0倍压力 | 应试(3): 2.5倍压力
    let pressureFactor = 1.0;
    let studyBonus = 1.0;

    if (state.mode === 1) { 
        pressureFactor = -15; // 佛系模式每回合直接强力扣除基础压力值
        studyBonus = 0.6;    // 教学产出变低
    } else if (state.mode === 3) {
        pressureFactor = 2.5; // 应试模式压力翻倍
        studyBonus = 2.0;    // 教学产出翻倍
    }

    // 调用原有的结算函数
    originalNextRoundForMode();

    // 结算后修正：如果处于佛系模式，强制再减去一部分压力
    if (state.mode === 1) {
        state.pressure = Math.max(0, state.pressure - 20); 
        addLog("🍃 佛系模式生效：通过组织郊游和缩短课时，学生压力大幅下降。");
    }
    
    updateUI();
};

// 3. 自动生成/修复模式切换 UI
(function ensureModeButtons() {
    setTimeout(() => {
        let controls = document.querySelector('.controls');
        if (!controls) return;

        // 如果没有模式按钮组，强行插入
        if (!document.querySelector('.mode-toggles')) {
            const toggleHTML = `
                <div class="mode-toggles" style="display:flex; gap:10px; margin-bottom:10px;">
                    <button class="btn-mode ${state.mode===1?'active':''}" onclick="setMode(1)" style="border-radius:20px; padding:6px 12px; font-size:12px;">佛系教育</button>
                    <button class="btn-mode ${state.mode===2?'active':''}" onclick="setMode(2)" style="border-radius:20px; padding:6px 12px; font-size:12px;">标准模式</button>
                    <button class="btn-mode ${state.mode===3?'active':''}" onclick="setMode(3)" style="border-radius:20px; padding:6px 12px; font-size:12px;">应试魔鬼</button>
                </div>
            `;
            controls.insertAdjacentHTML('afterbegin', toggleHTML);
        }
    }, 500);
})();
/* --- 模式系统：全自动恢复与重做补丁 --- */

(function rebootModeSystem() {
    // 1. 强行在页面底部注入 HTML 结构 (防止你删掉了相关的 div)
    const injectHTML = () => {
        // 如果页面没有控制栏，直接在 body 最后加一个
        let controls = document.querySelector('.controls');
        if (!controls) {
            controls = document.createElement('div');
            controls.className = 'controls';
            document.body.appendChild(controls);
        }

        // 强行清理并重做模式按钮组
        let modeToggles = document.querySelector('.mode-toggles');
        if (!modeToggles) {
            modeToggles = document.createElement('div');
            modeToggles.className = 'mode-toggles';
            // 插入到“结束本学期”按钮之前
            const nextBtn = controls.querySelector('.btn-next');
            if (nextBtn) controls.insertBefore(modeToggles, nextBtn);
            else controls.appendChild(modeToggles);
        }

        // 写入按钮内容
        modeToggles.innerHTML = `
            <button class="btn-mode ${state.mode === 1 ? 'active' : ''}" onclick="setMode(1)">佛系教育</button>
            <button class="btn-mode ${state.mode === 2 ? 'active' : ''}" onclick="setMode(2)">标准模式</button>
            <button class="btn-mode ${state.mode === 3 ? 'active' : ''}" onclick="setMode(3)">应试魔鬼</button>
        `;
    };

    // 2. 重新定义 setMode 逻辑 (重点：佛系减压)
    window.setMode = function(m) {
        state.mode = m;
        // 刷新 UI 样式
        document.querySelectorAll('.btn-mode').forEach((btn, i) => {
            btn.classList.toggle('active', (i + 1) === m);
        });

        const msgs = [
            "🍃 已切换为【佛系模式】：压力将每回合大幅自动减少！",
            "📊 已切换为【标准模式】：稳健发展。",
            "🔥 已切换为【应试模式】：教学质量暴涨，但压力也会狂飙！"
        ];
        addLog(msgs[m-1]);
    };

    // 3. 拦截并重做结算逻辑 (让佛系模式真正减压)
    const originalNextRound = nextRound;
    window.nextRound = function() {
        // --- 结算前修正 ---
        if (state.mode === 1) {
            // 佛系模式：降低一点基础压力增长
            addLog("🧘 佛系光环生效中...");
        }

        // 执行原有结算逻辑
        originalNextRound();

        // --- 结算后修正 (强制减压) ---
        if (state.mode === 1) {
            // 佛系模式：每回合额外减 20% 压力，且压力上限锁定在低位
            state.pressure = Math.max(0, state.pressure - 25);
            addLog("✨ 佛系效果：学生们在冥想和玩耍中释放了大量压力。");
        } else if (state.mode === 3) {
            // 应试模式：额外增加 15% 压力
            state.pressure = Math.min(100, state.pressure + 15);
            addLog("💢 应试压力：繁重的课业让学生喘不过气！");
        }

        updateUI(); // 确保数值立即刷新
    };

    // 执行注入
    setTimeout(injectHTML, 500);
})();



</script>
