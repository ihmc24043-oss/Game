<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传奇校长：万全不缩水版</title>
    <style>
        :root {
            --p-blue: #3498db; --p-red: #e74c3c; --p-gold: #f1c40f; 
            --p-green: #27ae60; --p-dark: #2c3e50; --p-purple: #9b59b6;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: "PingFang SC", sans-serif; background: var(--p-dark); color: #333; margin: 0; padding-bottom: 180px; }
        
        /* 状态栏 */
        .stats-bar { position: sticky; top: 0; background: var(--p-dark); color: white; display: grid; grid-template-columns: repeat(4, 1fr); padding: 15px; z-index: 1000; border-bottom: 2px solid var(--p-gold); }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 14px; font-weight: bold; color: var(--p-gold); }
        .stat-label { font-size: 10px; opacity: 0.7; }

        .container { padding: 15px; background: #f4f7f6; min-height: 100vh; border-radius: 25px 25px 0 0; }
        h2 { border-left: 4px solid var(--p-blue); padding-left: 10px; font-size: 16px; margin: 20px 0 10px; }

        /* 24地块系统 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .slot { aspect-ratio: 1; background: #e0e0e0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; position: relative; border: 2px dashed #bbb; cursor: pointer; transition: 0.2s; text-align: center; padding: 2px; }
        .slot.built { background: white; border: 2px solid var(--p-blue); border-style: solid; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .lv-badge { position: absolute; top: -5px; right: -5px; background: var(--p-red); color: white; padding: 1px 4px; border-radius: 6px; font-size: 9px; font-weight: bold; z-index: 10; }

        /* 滚动列表 */
        .scroll-row { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0 15px 0; scrollbar-width: none; }
        .card { min-width: 130px; background: white; padding: 10px; border-radius: 12px; border: 1px solid #eee; flex-shrink: 0; position: relative; }
        .tag { font-size: 9px; padding: 2px 4px; border-radius: 4px; margin-top: 4px; display: inline-block; }
        .tag-good { background: #e8f5e9; color: #2e7d32; }
        .tag-bad { background: #ffebee; color: #c62828; }

        /* 控制面板 */
        .footer-ui { position: fixed; bottom: 0; width: 100%; background: white; padding: 12px; z-index: 2000; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
        .mode-toggles { display: flex; gap: 6px; margin-bottom: 10px; }
        .btn-mode { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 11px; font-weight: bold; }
        .btn-mode.active { background: var(--p-blue); color: white; border-color: var(--p-blue); }
        .btn-next { width: 100%; padding: 16px; border-radius: 15px; background: var(--p-dark); color: var(--p-gold); border: none; font-size: 17px; font-weight: bold; }

        #logs { background: #1a252f; color: #2ecc71; padding: 10px; font-family: monospace; font-size: 11px; height: 80px; overflow-y: auto; border-radius: 12px; margin-bottom: 10px; line-height: 1.4; }

        /* 弹窗中的建筑大列表 */
        .build-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .build-item { border: 1px solid #ddd; padding: 10px; border-radius: 10px; text-align: center; }

        .modal-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 3000; }
        .modal-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; background: white; border-radius: 20px; padding: 20px; z-index: 3001; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="stats-bar">
    <div class="stat-item"><span class="stat-label">经费</span><span class="stat-val" id="money">¥1.0M</span></div>
    <div class="stat-item"><span class="stat-label">压力</span><span class="stat-val" id="pressure">0%</span></div>
    <div class="stat-item"><span class="stat-label">名望</span><span class="stat-val" id="rep">60</span></div>
    <div class="stat-item"><span class="stat-label">学期</span><span class="stat-val" id="round">1</span></div>
</div>

<div class="container">
    <div id="logs">校报：新学期开始了，请校长指示。</div>

    <h2>校园建设 (24地块)</h2>
    <div class="grid" id="grid"></div>

    <h2>人才市场</h2>
    <div class="scroll-row" id="market-list"></div>

    <h2>科研中心</h2>
    <div class="scroll-row">
        <div class="card" onclick="research(0)"><b>智慧校园</b><br><small>全校学力+15%</small><span id="res-0" class="tag">未解锁</span></div>
        <div class="card" onclick="research(1)"><b>心理辅导</b><br><small>基础减压+30</small><span id="res-1" class="tag">未解锁</span></div>
        <div class="card" onclick="research(2)"><b>后勤优化</b><br><small>运营成本-20%</small><span id="res-2" class="tag">未解锁</span></div>
    </div>

    <h2>校长业务</h2>
    <div class="scroll-row">
        <div class="card" onclick="doPR()"><b>📢 媒体公关</b><br><small>¥50k / 升名望</small></div>
        <div class="card" onclick="takeHoliday()"><b>🏖️ 全校放假</b><br><small>¥3w / 强效减压</small></div>
        <div class="card" onclick="recruit()"><b>🌍 全球招生</b><br><small>¥10w / 增加学生</small></div>
    </div>
</div>

<div class="footer-ui">
    <div class="mode-toggles">
        <button class="btn-mode" id="m1" onclick="setMode(1)">🍃 佛系</button>
        <button class="btn-mode active" id="m2" onclick="setMode(2)">⚖️ 标准</button>
        <button class="btn-mode" id="m3" onclick="setMode(3)">🔥 应试</button>
    </div>
    <button class="btn-next" onclick="nextRound()">🔔 结束学期 · 进入结算</button>
</div>

<div class="modal-mask" id="overlay" onclick="closeModal()"></div>
<div class="modal-box" id="modal"></div>

<script>
// 1. 完整建筑库 (完全不缩水，14种)
const ALL_ROOMS = {
    // 教学类
    c1: { name: "普通教室", cost: 30000, study: 10, pressure: 8, icon: "📚", type: "教学" },
    c2: { name: "多媒体教室", cost: 60000, study: 18, pressure: 12, icon: "🖥️", type: "教学" },
    c3: { name: "重点班", cost: 100000, study: 30, pressure: 20, icon: "🔝", type: "教学" },
    c4: { name: "竞赛实验室", cost: 150000, study: 50, pressure: 35, icon: "🧪", type: "教学" },
    // 素质类
    s1: { name: "音乐琴房", cost: 70000, study: 5, pressure: -15, icon: "🎹", type: "素质" },
    s2: { name: "艺术画室", cost: 70000, study: 5, pressure: -15, icon: "🎨", type: "素质" },
    s3: { name: "舞蹈房", cost: 80000, study: 8, pressure: -12, icon: "💃", type: "素质" },
    s4: { name: "图书馆", cost: 120000, study: 20, pressure: -5, icon: "📖", type: "素质" },
    // 后勤/体育类
    p1: { name: "医务室", cost: 100000, study: 0, pressure: -40, icon: "🏥", type: "功能" },
    p2: { name: "学生食堂", cost: 120000, study: 2, pressure: -10, icon: "🍱", type: "功能" },
    p3: { name: "体育馆", cost: 180000, study: 12, pressure: -25, icon: "🏀", type: "功能" },
    p4: { name: "游泳池", cost: 200000, study: 10, pressure: -30, icon: "🏊", type: "功能" },
    p5: { name: "学生宿舍", cost: 150000, study: 0, pressure: -15, icon: "🛌", type: "功能" },
    p6: { name: "广播站", cost: 50000, study: 3, pressure: -8, icon: "📢", type: "功能" }
};

const TEACHER_TYPES = [
    { trait: "严苛", sMod: 1.5, pMod: 2.2, css: "tag-bad" },
    { trait: "慈父", sMod: 0.7, pMod: -25, css: "tag-good" },
    { trait: "效率", sMod: 1.3, pMod: 1.1, css: "tag-good" }
];

let state = {
    money: 1000000, pressure: 0, rep: 60, round: 1, mode: 2,
    students: 20, slots: Array(24).fill(null),
    teachers: [], market: [], res: [false, false, false]
};

function init() { renderGrid(); refreshMarket(); updateUI(); }

function renderGrid() {
    const g = document.getElementById('grid'); g.innerHTML = '';
    state.slots.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = `slot ${s ? 'built' : ''}`;
        d.innerHTML = s ? `<div class="lv-badge">Lv.${s.lv}</div><span style="font-size:18px">${s.icon}</span><br>${s.name}` : '+';
        d.onclick = () => s ? openUpgrade(i) : openBuild(i);
        g.appendChild(d);
    });
}

function refreshMarket() {
    state.market = [];
    for(let i=0; i<4; i++) {
        const t = TEACHER_TYPES[Math.floor(Math.random()*TEACHER_TYPES.length)];
        state.market.push({ name: "教员"+(i+1), trait: t, power: 15+Math.floor(Math.random()*15), salary: 8000+Math.floor(Math.random()*4000) });
    }
    renderMarket();
}

function renderMarket() {
    const ml = document.getElementById('market-list'); ml.innerHTML = '';
    state.market.forEach((t, i) => {
        ml.innerHTML += `<div class="card"><b>${t.name}</b><br><span class="tag ${t.trait.css}">${t.trait.trait}</span><br><small>薪资: ¥${t.salary}</small><br><button onclick="hire(${i})" style="width:100%; margin-top:5px; font-size:10px;">招聘</button></div>`;
    });
}

function hire(i) { state.teachers.push(state.market[i]); state.market.splice(i, 1); renderMarket(); addLog("🤝 招聘成功。"); }

function setMode(m) { state.mode = m; document.querySelectorAll('.btn-mode').forEach((b, i) => b.classList.toggle('active', i+1===m)); }

function nextRound() {
    let bStudy = 0, bPress = 0;
    state.slots.forEach(s => { if(s){ bStudy += s.study; bPress += s.pressure; } });
    
    let tStudy = 0, tPressFix = 0;
    state.teachers.forEach(t => {
        tStudy += (t.power * t.trait.sMod);
        if(t.trait.pMod > 1) tPressFix += (bPress * (t.trait.pMod - 1));
        else if(t.trait.pMod < 0) tPressFix += t.trait.pMod;
    });

    let finalStudy = bStudy + tStudy;
    let finalPress = bPress + tPressFix;
    if(state.res[1]) finalPress -= 30;
    if(state.mode === 1) { finalPress -= 40; finalStudy *= 0.5; }
    else if(state.mode === 3) { finalPress += 30; finalStudy *= 2.5; }

    state.money += (state.students * 9000) - state.teachers.reduce((a,b)=>a+b.salary, 0);
    state.pressure = Math.max(0, Math.min(100, state.pressure + finalPress));
    state.rep += Math.floor(finalStudy / 10);
    state.round++;
    
    if(state.pressure > 95) { state.money -= 100000; state.rep -= 20; addLog("🚨 高压事故！赔偿10w", "red"); }
    addLog(`第${state.round-1}学期结束。`); updateUI(); renderGrid();
}

// 建造逻辑：展示全部14种建筑
function openBuild(i) {
    let h = `<h3>校园建设清单</h3><div class="build-grid">`;
    for(let k in ALL_ROOMS) {
        const r = ALL_ROOMS[k];
        h += `<div class="build-item" onclick="confirmBuild(${i},'${k}')">
                <span style="font-size:20px">${r.icon}</span><br>
                <b>${r.name}</b><br><small>¥${r.cost}</small>
              </div>`;
    }
    h += `</div>`; showModal(h);
}

function confirmBuild(i, k) {
    if(state.money >= ALL_ROOMS[k].cost) {
        state.money -= ALL_ROOMS[k].cost;
        state.slots[i] = {...ALL_ROOMS[k], lv: 1};
        closeModal(); updateUI(); renderGrid();
    } else alert("钱不够！");
}

// 升级逻辑：真正提升数值
function openUpgrade(i) {
    const s = state.slots[i];
    const cost = Math.floor(s.cost * 1.5 * s.lv);
    showModal(`<h3>升级：${s.name}</h3><p>Lv.${s.lv} → Lv.${s.lv+1}</p><p>效果提升 40%</p><button class="btn-next" onclick="confirmUpgrade(${i},${cost})">支付 ¥${cost} 升级</button>`);
}

function confirmUpgrade(i, c) {
    if(state.money >= c) {
        state.money -= c;
        const s = state.slots[i];
        s.lv++;
        s.study *= 1.4;
        if(s.pressure < 0) s.pressure *= 1.4;
        closeModal(); updateUI(); renderGrid();
        addLog(`✨ 升级成功：${s.name} 升至 Lv.${s.lv}`);
    } else alert("钱不够！");
}

function updateUI() {
    document.getElementById('money').innerText = `¥${(state.money/10000).toFixed(1)}w`;
    document.getElementById('pressure').innerText = `${Math.floor(state.pressure)}%`;
    document.getElementById('rep').innerText = state.rep;
    document.getElementById('round').innerText = state.round;
}

function addLog(m, c="#2ecc71") { const l = document.getElementById('logs'); l.innerHTML = `<span style="color:${c}">[T+${state.round}] ${m}</span><br>` + l.innerHTML; }
function showModal(h) { document.getElementById('modal').innerHTML = h; document.getElementById('overlay').style.display = 'block'; document.getElementById('modal').style.display = 'block'; }
function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; }
function doPR() { if(state.money >= 50000){ state.money -= 50000; state.rep += 20; updateUI(); addLog("📢 公关成功"); } }
function takeHoliday() { if(state.money >= 30000){ state.money -= 30000; state.pressure = Math.max(0, state.pressure - 40); updateUI(); addLog("🏝️ 放假成功"); } }
function recruit() { if(state.money >= 100000){ state.money -= 100000; state.students += 15; updateUI(); addLog("🌍 招收新学生"); } }
function research(id) { if(state.money >= 100000){ state.money -= 100000; state.res[id] = true; document.getElementById(`res-${id}`).innerText="已开启"; updateUI(); } }

init();
</script>
</body>
</html>
