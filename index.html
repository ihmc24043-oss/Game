<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校长大亨：权力巅峰</title>
    <style>
        :root { --gold: #ffd700; --red: #ff4757; --bg: #121212; --card: #1e1e1e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }

        /* 状态栏 */
        .top-nav { background: #000; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; border-bottom: 2px solid var(--gold); }
        .stat-item { text-align: center; }
        .stat-label { font-size: 10px; color: #888; display: block; }
        .stat-val { font-size: 15px; font-weight: bold; color: var(--gold); }

        /* 24格地块区 - 核心 */
        .game-world { flex: 1; padding: 10px; overflow-y: auto; display: flex; align-items: flex-start; justify-content: center; }
        .grid-24 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 400px; }
        .slot { aspect-ratio: 1; background: var(--card); border: 1px solid #333; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.2s; }
        .slot:active { transform: scale(0.95); }
        .slot.empty { border: 1px dashed #555; color: #444; font-size: 20px; }
        .slot.built { background: #fff; color: #000; border: 2px solid var(--gold); }
        .slot-name { font-size: 9px; font-weight: bold; text-align: center; margin-top: 4px; line-height: 1; }
        .slot-id { position: absolute; top: 2px; left: 4px; font-size: 8px; color: #888; }
        .lv-tag { position: absolute; top: 0; right: 0; background: var(--red); color: white; font-size: 8px; padding: 1px 4px; border-radius: 0 6px 0 6px; }

        /* 底部控制区 */
        .controls { background: #fff; color: #333; padding: 15px; border-radius: 20px 20px 0 0; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn { padding: 10px 0; border: none; border-radius: 8px; font-size: 11px; font-weight: bold; color: white; cursor: pointer; }
        
        .row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .fee-info { flex: 1; font-size: 12px; font-weight: bold; }
        .fee-slider { flex: 2; }

        .btn-run { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .btn-run:disabled { background: #ddd; color: #888; cursor: not-allowed; }
        .btn-run:not(:disabled) { background: #000; color: var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* 弹窗 */
        .ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal { width: 85%; background: white; border-radius: 15px; padding: 20px; color: #333; max-height: 70vh; overflow-y: auto; }
        .list-item { background: #f5f5f5; padding: 12px; margin-bottom: 8px; border-radius: 10px; border-left: 5px solid #000; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="stat-item"><span class="stat-label">经费</span><span class="stat-val" id="money">¥100w</span></div>
    <div class="stat-item"><span class="stat-label">名望</span><span class="stat-val" id="rep">60</span></div>
    <div class="stat-item"><span class="stat-label">压力</span><span class="stat-val" id="stress">0%</span></div>
    <div class="stat-item"><span class="stat-label">教室</span><span class="stat-val" id="c-count">0/6</span></div>
    <div class="stat-item"><span class="stat-label">教师</span><span class="stat-val" id="t-count">0/6</span></div>
    <div class="stat-item"><span class="stat-label">快乐值</span><span class="stat-val" id="joy">0</span></div>
</div>

<div class="game-world">
    <div class="grid-24" id="grid">
        </div>
</div>

<div class="controls">
    <div class="btn-grid">
        <button class="btn" style="background:#3498db" onclick="showUI('hire')">👨‍🏫 招聘</button>
        <button class="btn" style="background:#9b59b6" onclick="showUI('media')">📱 媒体</button>
        <button class="btn" style="background:#e67e22" onclick="showUI('tour')">🌍 交流团</button>
        <button class="btn" style="background:#2c3e50" onclick="showUI('shop')">💎 奢侈品</button>
    </div>
    
    <div class="row">
        <div class="fee-info">学费: <span id="fee-txt">8000</span></div>
        <input type="range" class="fee-slider" id="fee-range" min="3000" max="100000" value="8000" oninput="changeFee(this.value)">
    </div>

    <button class="btn-run" id="btn-next" onclick="nextRound()">需盖满6间房+招6名老师</button>
</div>

<script>
// --- 数据与状态 ---
const BUILDINGS = [
    { id: 'c', name: "标准教室", cost: 50000, study: 20, p: 10, cap: 50 },
    { id: 'c', name: "微机教室", cost: 200000, study: 80, p: 25, cap: 40 },
    { id: 's', name: "心理室", cost: 300000, study: 0, p: -80, cap: 0 },
    { id: 's', name: "大食堂", cost: 150000, study: 5, p: -20, cap: 0 }
];

const TEACHERS = [
    { name: "实习生", wage: 3000, q: 15 },
    { name: "老教师", wage: 8000, q: 50 },
    { name: "特级名师", wage: 20000, q: 120 }
];

let state = {
    money: 1000000, rep: 60, stress: 0, joy: 0, media: 0,
    slots: Array(24).fill(null),
    teachers: [],
    fee: 8000
};

// --- 初始化 24 地块 ---
function initGrid() {
    const container = document.getElementById('grid');
    container.innerHTML = '';
    state.slots.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = s ? 'slot built' : 'slot empty';
        div.innerHTML = `<span class="slot-id">#${i+1}</span>`;
        if(s) {
            div.innerHTML += `<span class="lv-tag">Lv.${s.lv}</span><span class="slot-name">${s.name}</span>`;
            div.onclick = () => manageBuild(i);
        } else {
            div.innerHTML += `+`;
            div.onclick = () => showBuildMenu(i);
        }
        container.appendChild(div);
    });
    refreshStats();
}

// --- 核心逻辑 ---
function refreshStats() {
    const classrooms = state.slots.filter(s => s && s.name.includes("教室")).length;
    document.getElementById('money').innerText = `¥${(state.money/10000).toFixed(1)}w`;
    document.getElementById('rep').innerText = state.rep;
    document.getElementById('stress').innerText = `${state.stress}%`;
    document.getElementById('c-count').innerText = `${classrooms}/6`;
    document.getElementById('t-count').innerText = `${state.teachers.length}/6`;
    document.getElementById('joy').innerText = state.joy;

    const btn = document.getElementById('btn-next');
    if(classrooms >= 6 && state.teachers.length >= 6) {
        btn.disabled = false;
        btn.innerText = "🔔 开启新学期结算";
    } else {
        btn.disabled = true;
        btn.innerText = `还差 ${6-classrooms}教室 / ${6-state.teachers.length}老师`;
    }
}

function showBuildMenu(idx) {
    let h = BUILDINGS.map(b => `
        <div class="list-item" onclick="doBuild(${idx}, '${b.name}', ${b.cost}, ${b.study}, ${b.p}, ${b.cap})">
            <b>${b.name}</b> <span style="float:right">¥${b.cost}</span><br>
            <small>产出:${b.study} | 压力:${b.p} | 学生:+${b.cap}</small>
        </div>
    `).join('');
    openModal("扩建校园", h);
}

function doBuild(idx, name, cost, study, p, cap) {
    if(state.money >= cost) {
        state.money -= cost;
        state.slots[idx] = { name, lv: 1, study, p, cap, baseCost: cost };
        closeModal();
        initGrid();
    } else alert("经费不足！");
}

function manageBuild(idx) {
    let s = state.slots[idx];
    let cost = Math.floor(s.baseCost * 0.8);
    openModal(s.name, `
        <p>当前等级: Lv.${s.lv}</p>
        <button class="list-item" style="width:100%; text-align:left;" onclick="upgrade(${idx}, ${cost})">🔼 升级设施 (¥${cost})</button>
        <button class="list-item" style="width:100%; text-align:left; color:red;" onclick="removeB(${idx})">🗑️ 拆除建筑</button>
    `);
}

function upgrade(idx, c) {
    if(state.money >= c) {
        state.money -= c;
        state.slots[idx].lv++;
        state.slots[idx].study *= 1.5;
        closeModal(); initGrid();
    }
}

function removeB(idx) { state.slots[idx] = null; closeModal(); initGrid(); }

function showUI(type) {
    let h = "";
    if(type === 'hire') {
        h = TEACHERS.map(t => `
            <div class="list-item" onclick="doHire('${t.name}', ${t.wage}, ${t.q})">
                <b>${t.name}</b> <span style="float:right">薪资:¥${t.wage}</span><br>
                <small>教学质量: +${t.q}</small>
            </div>
        `).join('');
        openModal("人才市场", h);
    } else if(type === 'shop') {
        h = `
            <div class="list-item" onclick="buyLuxury(200000, 50)">⌚ 黄金劳力士 (¥20w) +50快乐</div>
            <div class="list-item" onclick="buyLuxury(2000000, 500)">🚁 私人飞机 (¥200w) +500快乐</div>
        `;
        openModal("校长奢侈品", h);
    } else if(type === 'media') {
        h = `<div class="list-item" onclick="upMedia()">📱 提升公关等级 (¥20w) <br><small>当前: Lv.${state.media}</small></div>`;
        openModal("媒体公关", h);
    } else if(type === 'tour') {
        h = `<div class="list-item" onclick="goTour(100000, 15)">🇬🇧 剑桥考察团 (¥10w) +15名望</div>`;
        openModal("国际交流团", h);
    }
}

function doHire(n, w, q) { state.teachers.push({n, w, q}); closeModal(); refreshStats(); }
function buyLuxury(c, j) { if(state.money >= c) { state.money -= c; state.joy += j; closeModal(); refreshStats(); } }
function upMedia() { if(state.money >= 200000) { state.money -= 200000; state.media++; closeModal(); refreshStats(); } }
function goTour(c, r) { if(state.money >= c) { state.money -= c; state.rep += r; closeModal(); refreshStats(); } }

function changeFee(v) { state.fee = v; document.getElementById('fee-txt').innerText = v; }

function nextRound() {
    let cap = 0, sTotal = 0, pTotal = 0;
    state.slots.forEach(s => { if(s) { cap += s.cap; sTotal += s.study; pTotal += s.p; } });
    state.teachers.forEach(t => { sTotal += t.q; state.money -= t.w; });

    // 学费收入与风险
    if(state.fee > 20000 && Math.random() < (state.fee/100000)) {
        alert("🚨 举报！政府没收了违规学费并罚款 ¥50w！");
        state.money -= 500000; state.rep -= 20;
    } else {
        state.money += cap * state.fee;
    }

    state.stress = Math.max(0, state.stress + pTotal);
    state.rep += Math.floor(sTotal / 150);

    // 自杀逻辑
    if(state.stress > 90 && Math.random() < 0.4) {
        let hush = 1000000 / (state.media + 1);
        if(state.money >= hush) {
            alert(`💀 噩耗：学生跳楼。你支付了 ¥${(hush/10000).toFixed(1)}w 封口费，媒体被压制。`);
            state.money -= hush;
        } else {
            alert("💀 丑闻爆发！名望清零，学校被政府查封。");
            location.reload();
        }
    }

    state.money += 150000; // 基础拨款
    refreshStats();
    alert("学期结算完成！");
}

// --- 弹窗辅助 ---
function openModal(t, h) {
    const d = document.createElement('div');
    d.className = 'ov';
    d.innerHTML = `<div class="modal"><h3>${t}</h3><hr style="margin:10px 0;">${h}</div>`;
    d.onclick = (e) => { if(e.target === d) closeModal(); };
    document.body.appendChild(d);
}
function closeModal() { const d = document.querySelector('.ov'); if(d) d.remove(); }

window.onload = initGrid;
</script>

</body>
</html>
