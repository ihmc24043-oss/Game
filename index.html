
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传奇校长</title>
    <style>
        :root { --p-blue: #3498db; --p-gold: #f1c40f; --p-dark: #2c3e50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--p-dark); margin: 0; padding-bottom: 220px; }
        
        /* 顶栏 */
        .stats-bar { position: sticky; top: 0; background: var(--p-dark); color: white; display: grid; grid-template-columns: repeat(4, 1fr); padding: 15px; border-bottom: 2px solid var(--p-gold); z-index: 100; }
        .stat-val { display: block; color: var(--p-gold); font-weight: bold; }

        /* 主体 */
        .container { background: #f4f7f6; padding: 15px; border-radius: 25px 25px 0 0; min-height: 100vh; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .slot { aspect-ratio: 1; background: #eee; border-radius: 12px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 10px; position: relative; }
        .slot.built { background: white; border: 2px solid var(--p-blue); border-style: solid; }
        .lv-badge { position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; padding: 2px 5px; border-radius: 6px; font-size: 9px; }

        /* 底部控制 */
        .footer-ui { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); z-index: 999; border-radius: 20px 20px 0 0; }
        .btn-next { width: 100%; padding: 18px; background: var(--p-dark); color: var(--p-gold); border: none; border-radius: 15px; font-size: 18px; font-weight: bold; }

        /* --- 弹窗核心修复：初始状态绝对无样式 --- */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 10000; }
        #modal { position: fixed; z-index: 10001; display: none; pointer-events: none; }
    </style>
</head>
<body>

<div class="stats-bar">
    <div class="stat-item"><small>经费</small><span class="stat-val" id="money">¥100w</span></div>
    <div class="stat-item"><small>压力</small><span class="stat-val" id="pressure">0%</span></div>
    <div class="stat-item"><small>名望</small><span class="stat-val" id="rep">60</span></div>
    <div class="stat-item"><small>学期</small><span class="stat-val" id="round">1</span></div>
</div>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<div class="footer-ui">
    <button class="btn-next" onclick="nextRound()">🔔 结束学期</button>
</div>

<div id="overlay" onclick="closePopup()"></div>
<div id="modal"></div>

<script src="script.js"></script>
</body>
</html>
