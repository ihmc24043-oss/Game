<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Tycoon: Sovereign</title>
    <style>
        :root {
            --bg: #020617; --panel: #111827; --accent: #38bdf8;
            --t1: #f1f5f9; --t2: #3b82f6; --t3: #a855f7;
            --danger: #ef4444; --success: #22c55e; --warning: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 状态中控台 */
        #dashboard {
            background: var(--panel); padding: 12px; border-bottom: 2px solid var(--accent);
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; z-index: 100;
        }
        .stat-card { background: rgba(0,0,0,0.4); padding: 4px; border-radius: 4px; border: 1px solid #1e293b; text-align: center; }
        .label { font-size: 9px; color: #94a3b8; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        .val { font-size: 12px; font-weight: bold; color: #fbbf24; }
        .val.risk { color: var(--danger); }

        /* 6x4 物理地块矩阵 */
        #world-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; justify-content: center; background: #020617; }
        #school-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); /* 严格物理4列布局 */
            gap: 10px; width: 100%; max-width: 420px;
        }
        .plot {
            aspect-ratio: 1/1; background: #0f172a; border: 1px solid #334155;
            border-radius: 10px; position: relative; transition: all 0.25s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .plot.selected { border: 2px solid var(--accent); background: #1e293b; box-shadow: 0 0 15px var(--accent); z-index: 10; transform: scale(1.05); }
        
        /* 阶梯进化系统样式 */
        .tier-T1 { border: 1.5px solid var(--t1); }
        .tier-T2 { border: 2px solid var(--t2); box-shadow: inset 0 0 10px var(--t2); color: var(--t2); }
        .tier-T3 { 
            border: 2px solid var(--t3); box-shadow: inset 0 0 20px var(--t3); color: var(--t3); 
            animation: glow 2s infinite alternate; font-weight: 800;
        }
        @keyframes glow { from { box-shadow: 0 0 5px var(--t3); } to { box-shadow: 0 0 20px var(--t3); } }

        .plot-id { position: absolute; top: 3px; left: 5px; font-size: 8px; color: #475569; }
        .plot-info { text-align: center; pointer-events: none; }
        .p-type { font-size: 11px; margin-bottom: 2px; }
        .p-lv { font-size: 8px; background: #000; padding: 1px 4px; border-radius: 5px; }

        /* 交互反馈层 */
        #footer { background: var(--panel); padding: 15px; border-top: 2px solid #1e293b; }
        #log-console {
            background: rgba(0,0,0,0.8); height: 60px; border-radius: 6px; padding: 8px;
            overflow-y: auto; font-size: 10px; color: #10b981; font-family: monospace;
            margin-bottom: 12px; border: 1px solid #334155;
        }
        .action-row { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
        .action-row::-webkit-scrollbar { display: none; }
        .btn {
            flex: 0 0 auto; padding: 10px 18px; border-radius: 8px; border: none;
            color: white; font-size: 11px; font-weight: bold; background: #334155;
            transition: 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-build { background: #0369a1; }
        .btn-upgrade { background: #7e22ce; }
        .btn-special { background: #059669; }
        
        #run-btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white; font-size: 18px; font-weight: 900; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        .quota-status { font-size: 10px; color: #94a3b8; text-align: center; margin-bottom: 8px; }
        .green { color: var(--success); }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="stat-card"><span class="label">经费(w)</span><span id="f" class="val">150</span></div>
    <div class="stat-card"><span class="label">名望</span><span id="r" class="val">50</span></div>
    <div class="stat-card"><span class="label">全校压力</span><span id="s" class="val">0%</span></div>
    <div class="stat-card"><span class="label">校长快乐</span><span id="h" class="val">50</span></div>
    <div class="stat-card"><span class="label">教师编制</span><span id="t" class="val">0/6</span></div>
    <div class="stat-card"><span class="label">研发/公关</span><span id="rp" class="val">1 / 1</span></div>
    <div class="stat-card"><span class="label">学费标准</span><span id="tui" class="val">5k</span></div>
    <div class="stat-card"><span class="label">破产风险</span><span id="risk" class="val">低</span></div>
</div>

<div id="world-container">
    <div id="school-grid"></div>
</div>

<div id="footer">
    <div id="log-console">> 校长您好，核心 6x4 物理地块已准备就绪。请开启您的教育帝国。</div>
    <div class="quota-status" id="quota">许可状态：[教学楼 0/6] [教职员工 0/6]</div>
    
    <div class="action-row">
        <button class="btn btn-build" onclick="act('build','Class')">普通教室(5w)</button>
        <button class="btn btn-build" onclick="act('build','Lab')">AI实验室(35w)</button>
        <button class="btn btn-special" onclick="act('build','Music')">音乐厅(15w)</button>
        <button class="btn btn-special" onclick="act('build','Gym')">体育中心(15w)</button>
        <button class="btn btn-special" onclick="act('build','Craft')">手工工坊(15w)</button>
        <button class="btn btn-upgrade" onclick="act('up')">进化升级(倍增)</button>
        <button class="btn" style="background:#4f46e5" onclick="act('rd')">深度研发(50w)</button>
        <button class="btn" style="background:#2563eb" onclick="act('pr')">媒体公关(30w)</button>
        <button class="btn" style="background:#b45309" onclick="act('hire')">名师猎聘(4w)</button>
        <button class="btn" style="background:#4b5563" onclick="act('tui', 1000)">提高学费</button>
        <button class="btn" style="background:#db2777" onclick="act('lux')">买劳力士(100w)</button>
    </div>
    
    <button id="run-btn" onclick="act('run')">开启新学期结算</button>
</div>

<script>
    const TXT = { Class:'基础教学', Lab:'AI科研', Music:'音乐中心', Gym:'体育中心', Craft:'手工工坊' };
    let game = {
        funds: 150.0, rep: 50, happy: 50, tui: 5000, 
        sel: -1, teachers: 0, pr: 1, rd: 1,
        plots: Array(24).fill(null).map((_, i) => ({ id: i+1, type: '', tier: 'T1', lv: 0, cap: 0 }))
    };

    function update() {
        const grid = document.getElementById('school-grid');
        grid.innerHTML = '';
        let tc = 0; // Teaching count
        game.plots.forEach((p, i) => {
            const d = document.createElement('div');
            d.className = `plot ${p.type?'tier-'+p.tier:''} ${game.sel===i?'selected':''}`;
            d.onclick = () => { game.sel = i; update(); };
            if(['Class','Lab'].includes(p.type)) tc++;
            d.innerHTML = `<span class="plot-id">#${p.id}</span>
                           <div class="plot-info">
                               <div class="p-type">${p.type ? TXT[p.type] : '未开发'}</div>
                               ${p.lv ? `<span class="p-lv">${p.tier} v${p.lv}</span>` : ''}
                           </div>`;
            grid.appendChild(d);
        });

        // 核心数值公式
        let rc = game.plots.filter(p=>['Music','Gym','Craft'].includes(p.type)).length;
        let stressVal = (tc * 15) - (rc * 20 * game.rd) + (game.tui / 600);
        let finalStress = Math.max(0, Math.min(100, Math.floor(stressVal)));
        
        document.getElementById('f').innerText = Math.floor(game.funds);
        document.getElementById('r').innerText = game.rep;
        document.getElementById('s').innerText = finalStress + '%';
        document.getElementById('h').innerText = game.happy;
        document.getElementById('t').innerText = `${game.teachers}/6`;
        document.getElementById('rp').innerText = `${game.rd} / ${game.pr}`;
        document.getElementById('tui').innerText = (game.tui/1000).toFixed(1) + 'k';
        
        let riskVal = (game.tui > 12000 || finalStress > 80) ? '极高' : (game.tui > 8000 ? '中等' : '低');
        document.getElementById('risk').innerText = riskRisk = riskVal;
        document.getElementById('risk').className = 'val ' + (riskVal==='极高'?'risk':'');

        const q = document.getElementById('quota');
        q.innerHTML = `许可状态：<span class="${tc>=6?'green':''}">[教学楼 ${tc}/6]</span> <span class="${game.teachers>=6?'green':''}">[员工 ${game.teachers}/6]</span>`;
        
        return { tc, finalStress };
    }

    function log(msg, color) {
        const console = document.getElementById('log-console');
        console.innerHTML = `<div style="color:${color || '#10b981'}">> ${msg}</div>` + console.innerHTML;
    }

    function act(type, val) {
        let { tc, finalStress } = update();

        if(type === 'build') {
            if(game.sel < 0) return log("请点击地图选择待开发地块", "orange");
            if(game.plots[game.sel].type) return log("该地块已被占用", "orange");
            let cost = val==='Class'?5 : (val==='Lab'?35 : 15);
            if(game.funds < cost) return log("财务警告：经费不足以支持建设", "red");
            
            game.funds -= cost;
            let cap = val==='Class'?40 : (val==='Lab'?100 : 0);
            game.plots[game.sel] = { ...game.plots[game.sel], type: val, lv: 1, tier: 'T1', cap: cap };
            log(`地块#${game.sel+1} ${TXT[val]}建设完成`);
        } 
        else if(type === 'up') {
            let p = game.plots[game.sel];
            if(!p || !p.type) return;
            if(p.lv >= game.rd * 3) return log("研发瓶颈：提升研发等级(RD)以解锁更高形态", "orange");
            let cost = p.lv * 25;
            if(game.funds < cost) return log("经费短缺", "red");
            game.funds -= cost; p.lv++; p.cap += 40;
            if(p.lv === 3) p.tier = 'T2'; if(p.lv === 6) p.tier = 'T3';
            log(`地块#${p.id} 已进化至 ${p.tier} v${p.lv}`);
        }
        else if(type === 'rd') {
            let c = game.rd * 50; if(game.funds < c) return;
            game.funds -= c; game.rd++; log(`科研突破：当前研发等级 v${game.rd}`);
        }
        else if(type === 'pr') {
            if(game.funds < 30) return; game.funds -= 30; game.pr++; log("公关升级：封口费大幅降低");
        }
        else if(type === 'hire') {
            if(game.teachers >= 6) return log("名额已满");
            game.funds -= 4; game.teachers++; log("精英名师已入职");
        }
        else if(type === 'tui') { game.tui += val; }
        else if(type === 'lux') {
            if(game.funds < 100) return; game.funds -= 100; game.happy += 100; log("校长极其快乐，购买了限定奢侈品", "#db2777");
        }
        else if(type === 'run') {
            if(tc < 6 || game.teachers < 6) return log("开学失败：未达到 6间教室+6位老师 的最低经营门槛", "red");
            
            // 收入逻辑：Cap * 学费 * 研发加成 * 教师效率
            let rev = (game.plots.reduce((a,b)=>a+b.cap,0) * game.tui * (1 + game.rd * 0.1)) / 10000;
            game.funds += rev;

            // 1. 监管风暴（基于名望与学费）
            let fRisk = (game.tui / 10000) * (200 / (game.rep + 1));
            if(Math.random() < fRisk) {
                let f = rev * 3.5; game.funds -= f; game.rep -= 30;
                log(`【监管重罚】因过度乱收费被严惩，重罚 ${Math.floor(f)}w`, "red");
            } 
            // 2. 学生危机（高压事故）
            if(finalStress > 80 && Math.random() > 0.4) {
                let fee = 250 / game.pr;
                if(game.funds >= fee) { game.funds -= fee; log(`【紧急公关】平息高压导致的学生骚乱，耗资 ${Math.floor(fee)}w`, "orange"); }
                else { alert("灭顶之灾：学校发生重大事故且无力公关，被永久关停。"); location.reload(); }
            }
            // 3. 结局检查
            if(game.rep <= 0 || game.funds < -150) { alert("名望破产：您已被教育局撤职。"); location.reload(); }
            
            log(`学期结束：本季总营收 ${Math.floor(rev)}w，校园状态良好。`, "#22c55e");
        }
        update();
    }
    update();
</script>
</body>
</html>
