<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign 11.0: Architect Edition</title>
    <style>
        :root {
            --bg: #010409; --panel: #0d1117; --acc: #58a6ff;
            --t1: #8b949e; --t2: #1f6feb; --t3: #ab7df8;
            --gold: #d29922; --danger: #f85149; --success: #3fb950;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fira Code', 'Monaco', monospace; }
        body { background: var(--bg); color: #c9d1d9; height: 100vh; display: flex; overflow: hidden; font-size: 13px; }

        /* 左侧：物理模拟层 */
        #viewport { flex: 2; display: flex; flex-direction: column; padding: 25px; border-right: 1px solid #30363d; background-image: radial-gradient(#161b22 1px, transparent 1px); background-size: 20px 20px; }
        #canvas-header { margin-bottom: 20px; border-left: 4px solid var(--acc); padding-left: 15px; }
        #canvas-header h1 { font-size: 18px; color: var(--acc); letter-spacing: 2px; }
        
        #school-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(6, 1fr);
            gap: 12px; height: 100%; position: relative;
        }
        .plot {
            background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.25s; position: relative; overflow: hidden;
        }
        .plot:hover { border-color: var(--acc); box-shadow: 0 0 15px rgba(88, 166, 255, 0.2); }
        .plot.active { border: 2px solid var(--acc); background: rgba(88, 166, 255, 0.05); transform: translateY(-2px); }
        
        .type-label { font-size: 10px; font-weight: 900; color: #fff; text-shadow: 0 0 5px #000; z-index: 2; }
        .lv-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--acc); transition: width 0.3s; }
        .coord { position: absolute; top: 5px; right: 5px; font-size: 8px; color: #484f58; }

        /* 右侧：中控管理层 */
        #sidebar { flex: 1; display: flex; flex-direction: column; background: var(--panel); min-width: 400px; }
        #hud {
            padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: #161b22; border-bottom: 2px solid #30363d;
        }
        .hud-item { padding: 10px; border: 1px solid #30363d; border-radius: 6px; }
        .hud-item label { font-size: 9px; color: #8b949e; display: block; margin-bottom: 5px; }
        .hud-item b { font-size: 16px; color: var(--gold); }

        #terminal {
            flex: 1; padding: 15px; font-size: 11px; overflow-y: auto; background: #010409;
            color: #7ee787; line-height: 1.6; border-bottom: 1px solid #30363d;
        }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #238636; padding-left: 8px; }

        #actions { padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #0d1117; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .action-btn {
            background: #21262d; border: 1px solid #363b42; color: #c9d1d9;
            padding: 10px; border-radius: 6px; font-size: 10px; cursor: pointer;
            transition: 0.2s; font-weight: bold;
        }
        .action-btn:hover { background: #30363d; border-color: #8b949e; }
        .action-btn.primary { background: var(--t2); border: none; color: #fff; }
        .action-btn.special { background: #ab7df8; border: none; color: #fff; }
        
        #exec-btn {
            background: var(--success); color: #fff; border: none; padding: 18px;
            border-radius: 8px; font-size: 18px; font-weight: 900; letter-spacing: 5px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(63, 185, 80, 0.3);
        }

        /* 毕华季结算大屏 */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .report-card {
            width: 500px; background: #161b22; border: 2px solid var(--acc);
            padding: 40px; border-radius: 12px; position: relative;
        }
        .report-title { color: var(--gold); font-size: 24px; margin-bottom: 25px; text-align: center; font-weight: 900; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvas-header">
        <h1>SOVEREIGN CORE v11.0</h1>
        <p style="font-size: 10px; color: #8b949e;">INFRASTRUCTURE VIRTUALIZATION / GRADUATION ENGINE</p>
    </div>
    <div id="school-grid"></div>
</div>

<div id="sidebar">
    <div id="hud">
        <div class="hud-item"><label>财政储备 (FUND)</label><b id="h-funds">0.0</b><small>w</small></div>
        <div class="hud-item"><label>声望等级 (REP)</label><b id="h-rep">0</b></div>
        <div class="hud-item"><label>师资架构 (STAFF)</label><b id="h-staff">0/6</b></div>
        <div class="hud-item"><label>全校压力 (STRS)</label><b id="h-stress">0</b><small>%</small></div>
        <div class="hud-item"><label>研发指数 (RDX)</label><b id="h-rd">1</b></div>
        <div class="hud-item"><label>学费基准 (TUI)</label><b id="h-tui">5.0</b><small>k</small></div>
    </div>

    <div id="terminal"></div>

    <div id="actions">
        <div class="btn-row">
            <button class="action-btn" onclick="Game.build('Class')">物理教室(8w)</button>
            <button class="action-btn" onclick="Game.build('Lab')">AI实验室(55w)</button>
            <button class="action-btn primary" onclick="Game.upgrade()">形态进化</button>
        </div>
        <div class="btn-row">
            <button class="action-btn" onclick="Game.build('Art')">艺术工坊(25w)</button>
            <button class="action-btn" onclick="Game.build('Gym')">体育中心(25w)</button>
            <button class="action-btn" onclick="Game.build('Music')">音乐礼堂(25w)</button>
        </div>
        <div class="btn-row">
            <button class="action-btn special" onclick="Game.hire()">猎聘名师(10w)</button>
            <button class="action-btn" onclick="Game.research()">核心研发(80w)</button>
            <button class="action-btn" onclick="Game.pr()">媒体洗脑(45w)</button>
        </div>
        <div class="btn-row">
            <button class="action-btn" style="color:var(--danger)" onclick="Game.adjustTui(1000)">疯狂加费</button>
            <button class="action-btn" onclick="Game.luxury()">买海岛(500w)</button>
            <button class="action-btn" onclick="Game.exchange()">学术交流(60w)</button>
        </div>
        <button id="exec-btn" onclick="Game.settle()">开启“毕华季”结算</button>
    </div>
</div>

<div id="overlay">
    <div class="report-card">
        <div class="report-title">🎓 毕华季·年度发展报告</div>
        <div id="report-content"></div>
        <button onclick="Game.closeSettle()" style="width:100%; margin-top:30px; padding:15px; background:var(--gold); border:none; font-weight:bold; cursor:pointer;">接收校友荣誉</button>
    </div>
</div>

<script>
/**
 * SOVEREIGN 11.0: THE ARCHITECT ENGINE
 * 核心逻辑：基于类封装的强耦合系统
 */

class Building {
    constructor(id, type, config) {
        this.id = id;
        this.type = type;
        this.name = config.name;
        this.lv = 1;
        this.tier = 't1';
        this.cap = config.cap;
        this.durability = 100; // 耐久度系统
    }
}

class Teacher {
    constructor() {
        this.power = 10 + Math.random() * 20; // 教学力
        this.charm = 5 + Math.random() * 15;  // 魅力
    }
}

const Game = (() => {
    const ROOM_DEFS = {
        Class: { name: '标准教室', cap: 80, cost: 8 },
        Lab: { name: 'AI实验室', cap: 300, cost: 55 },
        Art: { name: '艺术馆', cap: 20, cost: 25 },
        Gym: { name: '体育场', cap: 20, cost: 25 },
        Music: { name: '大剧院', cap: 20, cost: 25 }
    };

    let state = {
        funds: 200.0, rep: 50, tui: 5000, 
        rd: 1, pr: 1, teachers: [],
        plots: Array(24).fill(null),
        selectedIdx: -1,
        totalGrads: 0
    };

    const dom = {
        grid: document.getElementById('school-grid'),
        terminal: document.getElementById('terminal'),
        overlay: document.getElementById('overlay'),
        report: document.getElementById('report-content')
    };

    // 核心引擎：复杂的压力与教学质量模型
    const calculateMetrics = () => {
        let roomCount = 0;
        let baseQuality = 0;
        let reliefFactor = 0;

        state.plots.forEach(p => {
            if(!p) return;
            if(['Class', 'Lab'].includes(p.type)) {
                roomCount++;
                baseQuality += p.cap * (1 + (p.lv * 0.2));
            } else {
                reliefFactor += (30 * state.rd * p.lv);
            }
        });

        // 压力指数 = (规模产生的基本压力) - (减压建筑贡献) + (学费造成的社会愤恨)
        let stress = (roomCount * 22) - reliefFactor + Math.pow(state.tui / 800, 1.8);
        stress = Math.max(0, Math.min(100, Math.floor(stress)));

        // 教学效能 = (教师总战力) * (1 - 压力衰减)
        let teacherPower = state.teachers.reduce((sum, t) => sum + t.power, 0);
        let efficiency = (teacherPower / 100) * (1 + state.rd * 0.1);

        return { roomCount, stress, baseQuality, efficiency };
    };

    const log = (msg, type = 'normal') => {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.style.color = type === 'err' ? 'var(--danger)' : '#7ee787';
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        dom.terminal.prepend(div);
    };

    const render = () => {
        dom.grid.innerHTML = '';
        state.plots.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = `plot ${p ? 'tier-' + p.tier : ''} ${state.selectedIdx === i ? 'active' : ''}`;
            div.onclick = () => { state.selectedIdx = i; render(); };
            div.innerHTML = `<span class="coord">${i+1}</span>`;
            
            if(p) {
                div.innerHTML += `
                    <span class="type-label">${p.name}</span>
                    <span style="font-size:8px; color:#8b949e">LV.${p.lv}</span>
                    <div class="lv-bar" style="width: ${(p.lv/10)*100}%"></div>
                `;
            }
            dom.grid.appendChild(div);
        });

        const m = calculateMetrics();
        document.getElementById('h-funds').innerText = state.funds.toFixed(1);
        document.getElementById('h-rep').innerText = state.rep;
        document.getElementById('h-staff').innerText = `${state.teachers.length}/6`;
        document.getElementById('h-stress').innerText = m.stress;
        document.getElementById('h-rd').innerText = state.rd;
        document.getElementById('h-tui').innerText = (state.tui/1000).toFixed(1);
    };

    return {
        build(type) {
            if(state.selectedIdx < 0) return log("错误：未锁定地块扇区", "err");
            if(state.plots[state.selectedIdx]) return log("警告：该区域已有结构物", "err");
            const conf = ROOM_DEFS[type];
            if(state.funds < conf.cost) return log("经费赤字：无法购买建筑材料", "err");

            state.funds -= conf.cost;
            state.plots[state.selectedIdx] = new Building(state.selectedIdx, type, conf);
            log(`指令下达：${conf.name} 建设工程启动`);
            render();
        },

        upgrade() {
            let p = state.plots[state.selectedIdx];
            if(!p) return;
            // 研发等级锁逻辑
            if(p.lv >= state.rd * 3) return log(`研发受限：当前 RDX 等级不支持进一步进化`, "err");
            let cost = p.lv * 30;
            if(state.funds < cost) return;

            state.funds -= cost;
            p.lv++;
            p.cap += 120;
            if(p.lv === 4) p.tier = 't2';
            if(p.lv === 7) p.tier = 't3';
            log(`${p.name} 模块完成版本更新至 v${p.lv}`);
            render();
        },

        hire() {
            if(state.teachers.length >= 6) return log("编制已满：精英配额仅 6 席", "err");
            if(state.funds < 10) return;
            state.funds -= 10;
            state.teachers.push(new Teacher());
            log("人才引进：一名顶级名师已入职核心教研组");
            render();
        },

        research() {
            let cost = state.rd * 80;
            if(state.funds < cost) return;
            state.funds -= cost;
            state.rd++;
            log(`实验室大突破：研发指数升至 Lv.${state.rd}`);
            render();
        },

        pr() {
            if(state.funds < 45) return;
            state.funds -= 45; state.pr++;
            log("媒体公关：公关团队成功控制了社会舆论");
            render();
        },

        adjustTui(val) {
            state.tui += val;
            log(`强制令：全校学费上浮至 ${(state.tui/1000).toFixed(1)}k`, "err");
            render();
        },

        luxury() {
            if(state.funds < 500) return log("经费不足：买不起私人海岛", "err");
            state.funds -= 500;
            state.rep += 200;
            log("史诗成就：你购买了太平洋海岛作为私人领地！", "normal");
            render();
        },

        exchange() {
            if(state.funds < 60) return;
            state.funds -= 60; state.rep += 100;
            log("学术外交：与世界名校签署了合作协议");
            render();
        },

        settle() {
            const m = calculateMetrics();
            if(m.roomCount < 6 || state.teachers.length < 6) {
                return log("结算被拦截：基础设施(6间)与精英编制(6位)未对齐！", "err");
            }

            // 毕华季复杂计算逻辑
            let finalScore = Math.floor(m.baseQuality * m.efficiency * (1 - m.stress/100));
            let revenue = (m.baseQuality * state.tui * (1 + state.rd * 0.25)) / 10000;
            state.funds += revenue;

            let ivy = Math.floor(finalScore / 15);
            let tech = Math.floor(finalScore / 6);
            let drop = m.stress > 80 ? Math.floor(m.stress / 2) : 0;

            state.totalGrads += (ivy + tech);
            state.rep += Math.floor(ivy * 2.5);

            dom.report.innerHTML = `
                <div class="stat-line"><span>年度总营收：</span><b style="color:var(--success)">+${Math.floor(revenue)}w</b></div>
                <div class="stat-line"><span>常青藤/清北录取：</span><b style="color:var(--acc)">${ivy} 人</b></div>
                <div class="stat-line"><span>全球500强签约：</span><b style="color:var(--success)">${tech} 人</b></div>
                <div class="stat-line"><span>压力崩溃人数：</span><b style="color:var(--danger)">${drop} 人</b></div>
                <div class="stat-line"><span>累计杰出校友：</span><b style="color:var(--gold)">${state.totalGrads} 人</b></div>
            `;
            dom.overlay.style.display = 'flex';

            // 风险审计逻辑
            let auditRisk = (Math.pow(state.tui / 9000, 2)) / (state.pr * 1.2);
            if(Math.random() < auditRisk) {
                let fine = revenue * 5;
                state.funds -= fine;
                state.rep -= 100;
                log(`【重大危机】因过度涨价，校产被监管机构查封，重罚 ${Math.floor(fine)}w`, "err");
            }

            if(state.rep <= 0 || state.funds < -800) {
                alert("帝国破产：你的教育主权已丧失。");
                location.reload();
            }
            render();
        },

        closeSettle() { dom.overlay.style.display = 'none'; log("新学年开启，主权核心重新初始化..."); },
        init() { render(); log("Sovereign Core 11.0 系统自检完成。"); }
    };
})();

Game.init();
</script>
</body>
</html>
