<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传奇校长：独立逻辑重构版</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* 快速样式：你可以把这里的内容也存成 style.css */
        :root { --p-blue: #3498db; --p-gold: #f1c40f; --p-dark: #2c3e50; }
        body { font-family: sans-serif; background: var(--p-dark); margin: 0; padding-bottom: 200px; color: #333; }
        .stats-bar { position: sticky; top:0; background: var(--p-dark); color: white; display: grid; grid-template-columns: repeat(4, 1fr); padding: 15px; border-bottom: 2px solid var(--p-gold); z-index: 100; }
        .stat-val { display: block; color: var(--p-gold); font-weight: bold; }
        .container { background: #f4f7f6; padding: 15px; border-radius: 20px 20px 0 0; min-height: 100vh; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .slot { aspect-ratio: 1; background: #eee; border-radius: 10px; border: 2px dashed #ccc; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; position: relative; cursor: pointer; }
        .slot.built { background: white; border-style: solid; border-color: var(--p-blue); }
        .lv-badge { position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; padding: 2px 5px; border-radius: 5px; font-size: 9px; font-weight: bold; }
        .scroll-row { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; }
        .card { min-width: 140px; background: white; padding: 12px; border-radius: 12px; border: 1px solid #ddd; flex-shrink: 0; }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 4px; color: white; }
        .tag-bad { background: #e74c3c; }
        .tag-good { background: #2ecc71; }
        .footer-ui { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .mode-toggles { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-mode { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; }
        .btn-mode.active { background: var(--p-blue); color: white; }
        .btn-next { width: 100%; padding: 15px; background: var(--p-dark); color: var(--p-gold); border: none; border-radius: 12px; font-size: 18px; font-weight: bold; }
        #logs { height: 80px; background: #1a252f; color: #2ecc71; padding: 10px; overflow-y: auto; font-size: 11px; border-radius: 10px; margin-bottom: 10px; font-family: monospace; }
        .modal-mask { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; z-index: 1000; }
        .modal-box { position: fixed; top:50%; left:50%; transform: translate(-50%, -50%); width: 90%; background: white; padding: 20px; border-radius: 20px; z-index: 1001; max-height: 80vh; overflow-y: auto; }
        .build-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .build-item { border: 1px solid #eee; padding: 10px; border-radius: 10px; text-align: center; }
        .btn-action { width: 100%; background: var(--p-blue); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="stats-bar">
    <div class="stat-item"><small>经费</small><span class="stat-val" id="money">¥0</span></div>
    <div class="stat-item"><small>压力</small><span class="stat-val" id="pressure">0%</span></div>
    <div class="stat-item"><small>名望</small><span class="stat-val" id="rep">0</span></div>
    <div class="stat-item"><small>学期</small><span class="stat-val" id="round">1</span></div>
</div>

<div class="container">
    <div id="logs"></div>
    <h2>校园地块 (24)</h2>
    <div class="grid" id="grid"></div>
    <h2>人才市场</h2>
    <div class="scroll-row" id="market-list"></div>
</div>

<div class="footer-ui">
    <div class="mode-toggles">
        <button class="btn-mode" onclick="setMode(1)">佛系</button>
        <button class="btn-mode active" onclick="setMode(2)">标准</button>
        <button class="btn-mode" onclick="setMode(3)">应试</button>
    </div>
    <button class="btn-next" onclick="nextRound()">🔔 结束本学期</button>
</div>

<div class="modal-mask" id="overlay" onclick="closePopup()"></div>
<div class="modal-box" id="modal"></div>

<script src="script.js"></script> </body>
</html>
