<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Sovereign 12.0: The Leviathan</title>
    <style>
        :root {
            --bg: #030712; --pnl: #111827; --acc: #38bdf8;
            --t1: #94a3b8; --t2: #3b82f6; --t3: #8b5cf6;
            --gold: #f59e0b; --red: #ef4444; --grn: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cascadia Code', 'Fira Code', monospace; }
        body { background: var(--bg); color: #f3f4f6; height: 100vh; display: flex; overflow: hidden; font-size: 12px; }

        /* 左侧物理矩阵视图 */
        #matrix-sector { flex: 2; padding: 20px; border-right: 2px solid #1f2937; background: linear-gradient(135deg, #030712 0%, #111827 100%); position: relative; }
        #matrix-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        #matrix-header h1 { font-size: 22px; color: var(--acc); text-transform: uppercase; letter-spacing: 4px; }
        
        #grid-container {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(6, 1fr);
            gap: 15px; height: 88%;
        }
        .cell {
            background: rgba(31, 41, 55, 0.5); border: 1px solid #374151; border-radius: 12px;
            position: relative; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .cell:hover { border-color: var(--acc); background: rgba(56, 189, 248, 0.1); transform: scale(1.02); }
        .cell.selected { border: 2px solid var(--acc); box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); background: rgba(56, 189, 248, 0.15); }

        .tier-t1 { border-top: 4px solid var(--t1); }
        .tier-t2 { border-top: 4px solid var(--t2); box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.2); }
        .tier-t3 { border-top: 4px solid var(--t3); animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--t3); } 50% { box-shadow: 0 0 20px var(--t3); } 100% { box-shadow: 0 0 5px var(--t3); } }

        .cell-id { position: absolute; top: 6px; left: 8px; font-size: 9px; color: #6b7280; }
        .cell-name { font-weight: 800; font-size: 11px; text-align: center; color: #fff; margin-bottom: 4px; }
        .cell-stats { font-size: 8px; color: var(--acc); }

        /* 右侧指挥塔面板 */
        #command-tower { flex: 1; display: flex; flex-direction: column; background: var(--pnl); min-width: 420px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #status-hub {
            padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            background: rgba(0,0,0,0.3); border-bottom: 2px solid #1f2937;
        }
        .hub-stat { padding: 12px; background: #030712; border-radius: 8px; border-left: 4px solid var(--acc); }
        .hub-stat label { display: block; font-size: 8px; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px; }
        .hub-stat b { font-size: 18px; color: var(--gold); }

        #terminal-log {
            flex: 1; padding: 15px; font-size: 10px; background: #000; overflow-y: auto;
            color: #10b981; line-height: 1.8; border-bottom: 1px solid #1f2937;
        }
        .log-line { border-bottom: 1px solid #111827; padding: 4px 0; }
        .log-line.warn { color: var(--gold); }
        .log-line.err { color: var(--red); }

        #control-deck { padding: 20px; background: #111827; }
        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .act-btn {
            background: #1f2937; border: 1px solid #374151; color: #e5e7eb;
            padding: 12px 5px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 700;
            transition: 0.2s;
        }
        .act-btn:hover { background: #374151; border-color: var(--acc); }
        .act-btn.primary { background: linear-gradient(to bottom, #2563eb, #1d4ed8); border: none; }
        .act-btn.rare { background: linear-gradient(to bottom, #7c3aed, #6d28d9); border: none; }

        #mega-run {
            width: 100%; padding: 20px; background: linear-gradient(135deg, #059669, #047857);
            border: none; border-radius: 12px; color: #fff; font-size: 20px; font-weight: 900;
            letter-spacing: 6px; cursor: pointer; box-shadow: 0 10px 20px rgba(5, 150, 105, 0.3);
        }

        /* 毕华季大型覆盖层 */
        #grad-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #report-vault {
            width: 600px; background: #111827; border: 3px solid var(--gold);
            padding: 50px; border-radius: 20px; box-shadow: 0 0 100px rgba(245, 158, 11, 0.2);
        }
        .vault-h { color: var(--gold); font-size: 30px; margin-bottom: 30px; text-align: center; font-weight: 900; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .vault-stat { display: flex; justify-content: space-between; margin: 15px 0; font-size: 16px; border-bottom: 1px solid #1f2937; padding-bottom: 8px; }
    </style>
</head>
<body>

<div id="matrix-sector">
    <div id="matrix-header">
        <h1>Sovereign Core: The Leviathan</h1>
        <div style="text-align: right; color: #6b7280;">VERSION 12.4.0 / PHYSICAL DOMAIN</div>
    </div>
    <div id="grid-container"></div>
</div>

<div id="command-tower">
    <div id="status-hub">
        <div class="hub-stat"><label>Liquid Assets</label><b id="st-funds">0.0</b><small>w</small></div>
        <div class="hub-stat"><label>Global Reputation</label><b id="st-rep">0</b></div>
        <div class="hub-stat"><label>Faculty Quota</label><b id="st-staff">0/6</b></div>
        <div class="hub-stat"><label>Stress Index</label><b id="st-stress">0</b><small>%</small></div>
        <div class="hub-stat"><label>Research Lv</label><b id="st-rd">1</b></div>
        <div class="hub-stat"><label>Public Relations</label><b id="st-pr">1</b></div>
        <div class="hub-stat"><label>Tuition Base</label><b id="st-tui">5.0</b><small>k</small></div>
        <div class="hub-stat"><label>Owner Happiness</label><b id="st-happy">50</b></div>
    </div>

    <div id="terminal-log"></div>

    <div id="control-deck">
        <div class="action-row">
            <button class="act-btn" onclick="Core.execute('build','Class')">建设: 基础教室(10w)</button>
            <button class="act-btn" onclick="Core.execute('build','Lab')">建设: AI中心(60w)</button>
            <button class="act-btn primary" onclick="Core.execute('evolve')">形态进化: PHASE++</button>
        </div>
        <div class="action-row">
            <button class="act-btn" onclick="Core.execute('build','Gym')">设施: 体育中心(30w)</button>
            <button class="act-btn" onclick="Core.execute('build','Art')">设施: 艺术工坊(30w)</button>
            <button class="act-btn" onclick="Core.execute('build','Music')">设施: 维也纳厅(30w)</button>
        </div>
        <div class="action-row">
            <button class="act-btn rare" onclick="Core.execute('hire')">人才猎聘: 名师抽卡</button>
            <button class="act-btn" onclick="Core.execute('rd')">深度研发: 系统突破</button>
            <button class="act-btn" onclick="Core.execute('pr')">媒体公关: 舆论控制</button>
        </div>
        <div class="action-row">
            <button class="act-btn" style="color:var(--red)" onclick="Core.execute('tui_up')">暴力调价: +1.0k</button>
            <button class="act-btn" onclick="Core.execute('exchange')">全球学术交流团</button>
            <button class="act-btn rare" onclick="Core.execute('lux')">购买: 私人海岛</button>
        </div>
        <button id="mega-run" onclick="Core.execute('settle')">启动“毕华季”年度清算</button>
    </div>
</div>

<div id="grad-screen">
    <div id="report-vault">
        <div class="vault-h">毕业生去向年度总账单</div>
        <div id="vault-body"></div>
        <button onclick="Core.closeSettle()" style="width:100%; margin-top:40px; padding:20px; background:var(--gold); border:none; border-radius:10px; font-weight:900; color:#000; cursor:pointer; font-size:18px;">接收校友荣誉捐赠并开启新学年</button>
    </div>
</div>

<script>
/**
 * SOVEREIGN 12.0: THE LEVIATHAN - FULL ENGINE CODE
 * 核心设计目标：逻辑完全展开，代码行数最大化
 */

class Faculty {
    constructor() {
        this.id = Math.random().toString(36).substr(2, 5).toUpperCase();
        this.iq = 70 + Math.random() * 50;
        this.eq = 60 + Math.random() * 60;
        this.level = 'GRADE_A';
    }
}

class Infrastructure {
    constructor(id, type) {
        this.id = id;
        this.type = type;
        this.lv = 1;
        this.tier = 't1';
        this.durability = 100;
        this.maint_cost = 2;
        
        const config = {
            Class: { name: '物理基础教室', cap: 100, cost: 10 },
            Lab: { name: 'AI核心实验基地', cap: 400, cost: 60 },
            Gym: { name: '综合体育中心', cap: 20, cost: 30 },
            Art: { name: '皇家艺术工坊', cap: 20, cost: 30 },
            Music: { name: '维也纳金色礼堂', cap: 20, cost: 30 }
        };
        
        this.name = config[type].name;
        this.base_cap = config[type].cap;
        this.build_cost = config[type].cost;
    }
}

const Core = (() => {
    // 状态仓库 (State Repository)
    let state = {
        funds: 250.0,
        reputation: 60,
        tuition: 5000,
        rd_level: 1,
        pr_level: 1,
        happiness: 60,
        teachers: [],
        plots: Array(24).fill(null),
        selected_index: -1,
        total_alumni: 0,
        years_active: 0
    };

    // UI 指针
    const dom = {
        grid: document.getElementById('grid-container'),
        log: document.getElementById('terminal-log'),
        grad_overlay: document.getElementById('grad-screen'),
        grad_body: document.getElementById('vault-body')
    };

    const updateStats = () => {
        document.getElementById('st-funds').innerText = state.funds.toFixed(1);
        document.getElementById('st-rep').innerText = state.reputation;
        document.getElementById('st-staff').innerText = `${state.teachers.length}/6`;
        document.getElementById('st-rd').innerText = state.rd_level;
        document.getElementById('st-pr').innerText = state.pr_level;
        document.getElementById('st-tui').innerText = (state.tuition/1000).toFixed(1);
        document.getElementById('st-happy').innerText = state.happiness;
        
        const metrics = calculateMetrics();
        document.getElementById('st-stress').innerText = metrics.stress;
    };

    const calculateMetrics = () => {
        let classroom_capacity = 0;
        let relief_points = 0;
        let functional_rooms = 0;

        state.plots.forEach(p => {
            if(!p) return;
            if(['Class', 'Lab'].includes(p.type)) {
                classroom_capacity += p.base_cap * (1 + (p.lv * 0.3));
                functional_rooms++;
            } else {
                relief_points += (40 * state.rd_level * p.lv);
            }
        });

        // 复杂的社会压力算法
        let stress_base = (functional_rooms * 25) - relief_points + Math.pow(state.tuition / 750, 2);
        let final_stress = Math.max(0, Math.min(100, Math.floor(stress_base)));

        // 教学质量算法
        let teacher_power = state.teachers.reduce((a, b) => a + (b.iq + b.eq), 0);
        let quality_coeff = (teacher_power / 1000) * (1 + state.rd_level * 0.15) * (1 - final_stress/200);

        return { classroom_capacity, stress: final_stress, quality_coeff };
    };

    const print = (msg, level = 'normal') => {
        const line = document.createElement('div');
        line.className = `log-line ${level}`;
        line.innerText = `[SECURE_NODE_${new Date().getTime().toString().substr(-4)}] >> ${msg}`;
        dom.log.prepend(line);
    };

    const renderGrid = () => {
        dom.grid.innerHTML = '';
        state.plots.forEach((p, i) => {
            const el = document.createElement('div');
            el.className = `cell ${p ? 'tier-' + p.tier : ''} ${state.selected_index === i ? 'selected' : ''}`;
            el.onclick = () => { state.selected_index = i; renderGrid(); };
            el.innerHTML = `<span class="cell-id">#${String(i+1).padStart(2,'0')}</span>`;
            
            if(p) {
                el.innerHTML += `
                    <div class="cell-name">${p.name}</div>
                    <div class="cell-stats">LV.${p.lv} / CAP.${Math.floor(p.base_cap * (1+(p.lv*0.3)))}</div>
                `;
            }
            dom.grid.appendChild(el);
        });
    };

    return {
        execute(cmd, val) {
            const metrics = calculateMetrics();

            if(cmd === 'build') {
                if(state.selected_index < 0) return print("物理寻址错误: 未选定地块坐标", "err");
                if(state.plots[state.selected_index]) return print("资源冲突: 选定物理空间已被占用", "err");
                
                const temp = new Infrastructure(state.selected_index, val);
                if(state.funds < temp.build_cost) return print("资金链断裂: 无法支付建设工程款", "err");
                
                state.funds -= temp.build_cost;
                state.plots[state.selected_index] = temp;
                print(`基建指令已下达: ${temp.name} 建设中...`);
            }
            else if(cmd === 'evolve') {
                const p = state.plots[state.selected_index];
                if(!p) return print("寻址错误: 空白地块无法进化", "err");
                if(p.lv >= state.rd_level * 3) return print("技术壁垒: 需提升系统 RD 等级解锁下一形态", "warn");
                
                let cost = p.lv * 45;
                if(state.funds < cost) return print("经费不足", "err");
                
                state.funds -= cost;
                p.lv++;
                if(p.lv === 4) p.tier = 't2';
                if(p.lv === 8) p.tier = 't3';
                print(`地块 #${p.id+1} 成功进化至形态 ${p.tier.toUpperCase()} (Phase.${p.lv})`);
            }
            else if(cmd === 'hire') {
                if(state.teachers.length >= 6) return print("编制饱和: 校董会限制精英名额为 6 席", "warn");
                if(state.funds < 12) return;
                state.funds -= 12;
                state.teachers.push(new Faculty());
                print("人才招募成功: 一位具有 GRADE_A 资质的名师已入职中心教研室");
            }
            else if(cmd === 'rd') {
                let cost = state.rd_level * 80;
                if(state.funds < cost) return;
                state.funds -= cost;
                state.rd_level++;
                print(`核心系统架构已重构: 当前 R&D 级别升至 v${state.rd_level}`, "normal");
            }
            else if(cmd === 'pr') {
                if(state.funds < 45) return;
                state.funds -= 45; state.pr_level++;
                print("媒体关系网络已扩张: 风险对冲能力提升");
            }
            else if(cmd === 'tui_up') {
                state.tuition += 1000;
                print(`暴力指令: 全校基准学费上浮至 ${(state.tuition/1000).toFixed(1)}k`, "warn");
            }
            else if(cmd === 'exchange') {
                if(state.funds < 60) return;
                state.funds -= 60; state.reputation += 120;
                print("全球化战略: 国际名校交流团访问圆满结束，声望大幅溢出");
            }
            else if(cmd === 'lux') {
                if(state.funds < 500) return print("资产不足: 无法购置私人领海岛屿", "err");
                state.funds -= 500; state.happiness += 500; state.reputation += 100;
                print("绝对权力: 你购买了南太平洋私人海岛，校长幸福感爆表！");
            }
            else if(cmd === 'settle') {
                let functional_count = state.plots.filter(p => p && ['Class','Lab'].includes(p.type)).length;
                if(functional_count < 6 || state.teachers.length < 6) {
                    return print("核心逻辑拦截: 必须拥有 6 间以上教室及 6 位名师方可开启结算！", "err");
                }

                // 终极结算逻辑
                let score = Math.floor(metrics.classroom_capacity * metrics.quality_coeff * (1 - metrics.stress/100));
                let rev = (metrics.classroom_capacity * state.tuition * (1 + state.rd_level * 0.3)) / 10000;
                state.funds += rev;
                
                let ivy = Math.floor(score / 20);
                let unicorn = Math.floor(score / 8);
                let burnout = metrics.stress > 80 ? Math.floor(metrics.stress / 1.5) : 0;
                
                state.total_alumni += (ivy + unicorn);
                state.reputation += Math.floor(ivy * 3);
                state.years_active++;

                dom.grad_body.innerHTML = `
                    <div class="vault-stat"><span>本学年财政总营收：</span><b style="color:var(--grn)">+${Math.floor(rev)}w</b></div>
                    <div class="vault-stat"><span>常青藤/清北精英录取：</span><b style="color:var(--acc)">${ivy} 人</b></div>
                    <div class="vault-stat"><span>独角兽企业/大厂签约：</span><b style="color:var(--grn)">${unicorn} 人</b></div>
                    <div class="vault-stat"><span>因高度压榨精神崩溃：</span><b style="color:var(--red)">${burnout} 人</b></div>
                    <div class="vault-stat"><span>全球校友会总人数：</span><b style="color:var(--gold)">${state.total_alumni} 人</b></div>
                    <div class="vault-stat"><span>教育帝国存续时长：</span><b>第 ${state.years_active} 年</b></div>
                `;
                dom.grad_overlay.style.display = 'flex';

                // 监管博弈逻辑
                let audit_risk = (Math.pow(state.tuition / 8500, 2.8)) / (state.pr_level * 1.5);
                if(Math.random() < audit_risk) {
                    let fine = rev * 7;
                    state.funds -= fine; state.reputation -= 150;
                    print(`【毁灭级丑闻】因乱收费被中央监察组入驻调查，罚没所得并处罚金 ${Math.floor(fine)}w`, "err");
                }

                if(state.reputation <= 0 || state.funds < -1000) {
                    alert("主权崩塌：你已被教育部门终身禁入，学校资产清算完毕。");
                    location.reload();
                }
            }
            updateStats();
            renderGrid();
        },
        closeSettle() { dom.grad_overlay.style.display = 'none'; print("新年度周期开启，所有系统状态已同步完成。"); },
        init() { renderGrid(); updateStats(); print("SOVEREIGN CORE 12.0 启动成功，所有物理扇区已挂载。"); }
    };
})();

// 初始化引擎
Core.init();
</script>
</body>
</html>
