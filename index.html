<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite School: Omega Protocol</title>
    <style>
        :root {
            --bg: #020617; --panel: #1e293b; --accent: #38bdf8;
            --t1: #f8fafc; --t2: #3b82f6; --t3: #a855f7;
            --danger: #ef4444; --success: #22c55e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, sans-serif; background: var(--bg); color: white;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 状态看板 - 2行3列紧凑型 */
        #header {
            background: var(--panel); padding: 6px; border-bottom: 2px solid var(--accent);
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; z-index: 10;
        }
        .stat { background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-l { font-size: 8px; color: #94a3b8; display: block; margin-bottom: 1px; }
        .stat-v { font-size: 11px; font-weight: bold; color: #fbbf24; }

        /* 24地块棋盘 */
        #main-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; justify-content: center; }
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; max-width: 420px; }
        .plot {
            aspect-ratio: 1/1; background: #0f172a; border: 1px dashed #475569;
            border-radius: 6px; position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .plot.selected { border: 2px solid var(--accent); background: #1e293b; box-shadow: 0 0 10px var(--accent); }
        
        /* 三阶视觉进化 */
        .tier-T1 { border: 1px solid var(--t1); color: var(--t1); }
        .tier-T2 { border: 1.5px solid var(--t2); color: var(--t2); box-shadow: inset 0 0 8px var(--t2); }
        .tier-T3 { border: 2px solid var(--t3); color: var(--t3); box-shadow: inset 0 0 12px var(--t3); font-weight: bold; }

        .plot-id { position: absolute; top: 2px; left: 2px; font-size: 7px; opacity: 0.5; color: #fff; }
        .plot-tag { position: absolute; bottom: 2px; right: 2px; font-size: 7px; background: rgba(0,0,0,0.7); padding: 1px 3px; border-radius: 2px; }

        /* 底部控制中心 */
        #footer { background: var(--panel); padding: 8px; border-top: 1px solid #334155; }
        #log { background: #000; color: #10b981; font-size: 10px; padding: 6px; border-radius: 4px; margin-bottom: 8px; height: 32px; display: flex; align-items: center; border: 1px solid #1e293b; }
        
        .scroll-row { display: flex; overflow-x: auto; gap: 6px; padding-bottom: 8px; scrollbar-width: none; }
        .scroll-row::-webkit-scrollbar { display: none; }
        .btn { flex: 0 0 auto; padding: 8px 12px; border-radius: 4px; border: none; color: white; font-size: 10px; background: #334155; font-weight: 500; }
        
        .btn-run { width: 100%; background: var(--success); font-weight: bold; font-size: 15px; padding: 12px; border: none; color: white; border-radius: 6px; box-shadow: 0 4px 0 #15803d; }
        .btn-run:active { transform: translateY(2px); box-shadow: 0 2px 0 #15803d; }
    </style>
</head>
<body>

<div id="header">
    <div class="stat"><span class="stat-l">经费(w)</span><span id="f" class="stat-v">150</span></div>
    <div class="stat"><span class="stat-l">名望</span><span id="r" class="stat-v">50</span></div>
    <div class="stat"><span class="stat-l">压力值</span><span id="s" class="stat-v">0%</span></div>
    <div class="stat"><span class="stat-l">快乐值</span><span id="h" class="stat-v">50</span></div>
    <div class="stat"><span class="stat-l">教职</span><span id="t" class="stat-v">0/6</span></div>
    <div class="stat"><span class="stat-l">公关/研发</span><span id="pr_rd" class="stat-v">1 / 1</span></div>
</div>

<div id="main-area">
    <div id="grid"></div>
</div>

<div id="footer">
    <div id="log">> 建设6教室+6名师开启结算。注意：学费越高查处风险越大！</div>
    
    <div class="scroll-row">
        <button class="btn" style="background:#0369a1" onclick="cmd('build','Classroom')">普通教室(5w)</button>
        <button class="btn" style="background:#0e7490" onclick="cmd('build','Relief')">解压设施(10w)</button>
        <button class="btn" style="background:#7e22ce" onclick="cmd('upgrade')">进化升级(Lv*15)</button>
        <button class="btn" style="background:#b45309" onclick="cmd('hire')">招聘名师(2w)</button>
        <button class="btn" style="background:#6366f1" onclick="cmd('research')">技术研发(50w)</button>
        <button class="btn" style="background:#1e40af" onclick="cmd('tui', 1000)">学费+1k</button>
        <button class="btn" style="background:#1e40af" onclick="cmd('tui', -1000)">学费-1k</button>
        <button class="btn" style="background:#2563eb" onclick="cmd('pr')">媒体公关(20w)</button>
        <button class="btn" style="background:#059669" onclick="cmd('exc')">联谊哈佛(30w)</button>
        <button class="btn" style="background:#db2777" onclick="cmd('lux')">买金表(100w)</button>
        <button class="btn" style="background:#475569" onclick="cmd('salary', 500)">加薪(500)</button>
    </div>
    
    <button class="btn-run" onclick="cmd('run')">开启新学期结算</button>
</div>

<script>
    const RELIEF_NAMES = ["音乐室", "体育馆", "手工室", "电竞中心"];
    let game = {
        funds: 150.0, rep: 50, happy: 50, tui: 5000, 
        sel: -1, teachers: 0, pr: 1, rd: 1, salary: 5000, morale: 100,
        plots: Array(24).fill(null).map((_, i) => ({ id: i+1, type: '', tier: 'T1', lv: 0, cap: 0 }))
    };

    function ui() {
        const g = document.getElementById('grid'); g.innerHTML = '';
        game.plots.forEach((p, i) => {
            const d = document.createElement('div');
            d.className = `plot ${p.type?'tier-'+p.tier:''} ${game.sel===i?'selected':''}`;
            d.onclick = () => { game.sel = i; ui(); };
            let label = p.type==='Classroom'?'教学':(p.type==='Relief'?'解压':'待建');
            d.innerHTML = `<span class="plot-id">#${p.id}</span>
                           <b style="font-size:10px">${label}</b>
                           ${p.lv ? `<span class="plot-tag">${p.tier} v${p.lv}</span>` : ''}`;
            g.appendChild(d);
        });
        document.getElementById('f').innerText = Math.floor(game.funds);
        document.getElementById('r').innerText = game.rep;
        document.getElementById('h').innerText = game.happy;
        document.getElementById('t').innerText = `${game.teachers}/6`;
        document.getElementById('pr_rd').innerText = `${game.pr} / ${game.rd}`;
        
        // 压力逻辑更新
        let rc = game.plots.filter(p=>p.type==='Classroom').length;
        let lc = game.plots.filter(p=>p.type==='Relief').length;
        let s = (rc * 10) - (lc * 15 * game.rd) + (game.tui/700) - (game.morale/10);
        document.getElementById('s').innerText = Math.max(0, Math.min(100, Math.floor(s))) + '%';
        
        document.getElementById('tui').innerText = (game.tui/1000).toFixed(1) + 'k';
    }

    function log(m, c) {
        const b = document.getElementById('log');
        b.innerText = `> ${m}`; b.style.color = c || '#10b981';
    }

    function cmd(type, val) {
        if(type === 'build') {
            if(game.sel < 0) return log("请点击格子选择地块", "orange");
            if(game.plots[game.sel].type) return log("此处已有建筑", "orange");
            let cost = val==='Classroom' ? 5 : 10;
            if(game.funds < cost) return log("经费不足！", "red");
            game.funds -= cost;
            game.plots[game.sel] = { ...game.plots[game.sel], type: val, lv: 1, tier: 'T1', cap: (val==='Classroom'?40:0) };
            log(`建设成功！`);
        } 
        else if(type === 'upgrade') {
            let p = game.plots[game.sel];
            if(!p || !p.type) return log("选择已建地块升级", "orange");
            if(p.lv >= game.rd * 3) return log("研发等级限制进化！去研发技术", "orange");
            let cost = p.lv * 15;
            if(game.funds < cost) return log("经费不足升级", "red");
            game.funds -= cost; p.lv++; p.cap += 25;
            if(p.lv === 3) p.tier = 'T2';
            if(p.lv === 6) p.tier = 'T3';
            log(`#${p.id} 进化至 ${p.tier} v${p.lv}`);
        }
        else if(type === 'hire') {
            if(game.teachers >= 6) return log("编制已满(6人)");
            if(game.funds < 2) return log("招不起老师了");
            game.funds -= 2; game.teachers++; log("名师入职，工资5000/学期");
        }
        else if(type === 'salary') {
            game.salary += val; game.morale += (val>0?10:-20);
            log(`工资调整至 ${game.salary}，士气 ${game.morale}`);
        }
        else if(type === 'research') {
            let cost = game.rd * 50;
            if(game.funds < cost) return log("研发经费不足", "red");
            game.funds -= cost; game.rd++; log("技术研发成功，解锁进化上限");
        }
        else if(type === 'pr') {
            if(game.funds < 20) return;
            game.funds -= 20; game.pr++; log("媒体公关等级提升");
        }
        else if(type === 'tui') { game.tui = Math.max(2000, game.tui + val); }
        else if(type === 'exc') { 
            if(game.funds < 30) return;
            game.funds -= 30; game.rep += 40; log("国际交流团圆满成功", "yellow"); 
        }
        else if(type === 'lux') { 
            if(game.funds < 100) return log("你太穷了");
            game.funds -= 100; game.happy += 60; log("校长购买了限量版金表", "#db2777"); 
        }
        else if(type === 'run') {
            let rc = game.plots.filter(p=>p.type==='Classroom').length;
            if(rc < 6 || game.teachers < 6) return log("条件不足：需6教室+6名师", "red");
            
            // 财务结算
            let rev = (game.plots.reduce((a,b)=>a+b.cap,0) * game.tui) / 10000;
            let cost = (game.teachers * game.salary) / 10000;
            game.funds += (rev - cost);

            // 1. 学费查处博弈 (倍率罚款)
            let risk = (game.tui/10000) * (100/(game.rep+1)) * 0.2;
            if(Math.random() < risk) {
                let fine = rev * 3; game.funds -= fine; game.rep -= 30;
                log(`【查处】乱收费被罚款 ${Math.floor(fine)}w`, "red");
            }

            // 2. 负面事故逻辑 (封口费/PR)
            let stressVal = parseInt(document.getElementById('s').innerText);
            if(stressVal > 80 && Math.random() > 0.5) {
                let fee = 100 / game.pr;
                if(game.funds >= fee) { game.funds -= fee; log(`【事故】支付事故封口费 ${Math.floor(fee)}w`, "orange"); }
                else { alert("没钱支付封口费，丑闻曝光！学校倒闭。"); location.reload(); }
            }

            // 3. 教师士气逻辑
            if(game.morale < 20 && Math.random() > 0.7) {
                game.teachers--; log("有位老师因工资和压力辞职了！", "red");
            }

            // 4. 判定失败
            if(game.rep <= 0 || game.funds < -80) { alert("名望清零或巨额赤字，经营失败！"); location.reload(); }
            
            log(`学期结束：收益 ${Math.floor(rev - cost)}w`);
        }
        ui();
    }
    ui();
</script>
</body>
</html>
