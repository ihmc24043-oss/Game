<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校长：黑暗权力模拟器</title>
    <style>
        :root { --p-gold: #ffd700; --p-red: #ff4757; --p-blue: #2f3542; --p-bg: #1e272e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang SC", sans-serif; }
        body { background: var(--p-bg); color: white; overflow: hidden; height: 100vh; }

        /* 状态栏 */
        .top-nav { background: #000; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 2px solid var(--p-gold); }
        .stat { text-align: center; }
        .stat-label { font-size: 10px; color: #888; display: block; }
        .stat-val { font-size: 14px; font-weight: bold; color: var(--p-gold); }

        /* 游戏主区 */
        #main-view { padding: 15px; height: calc(100vh - 260px); overflow-y: auto; background: linear-gradient(to bottom, #2c3e50, #1e272e); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .cell { aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px dashed #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .cell.occupied { background: #fff; color: #000; border: none; font-size: 10px; font-weight: bold; text-align: center; }
        .lv-tag { position: absolute; top: 0; right: 0; background: var(--p-red); color: white; padding: 1px 4px; font-size: 8px; border-radius: 0 8px 0 8px; }

        /* 底部控制台 */
        .console { position: fixed; bottom: 0; width: 100%; height: 210px; background: #fff; color: #333; padding: 15px; border-radius: 20px 20px 0 0; }
        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .action-btn { background: var(--p-blue); color: white; border: none; padding: 10px 5px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        
        .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .fee-slider { flex: 1; accent-color: var(--p-red); }
        .status-pill { background: #f1f2f6; padding: 4px 8px; border-radius: 20px; font-size: 10px; border: 1px solid #ddd; }

        .btn-main { width: 100%; padding: 15px; background: #000; color: var(--p-gold); border: none; border-radius: 12px; font-size: 18px; font-weight: bold; }
        .btn-main:disabled { background: #ccc; color: #666; }

        /* 物理弹窗样式 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal { width: 85%; background: white; border-radius: 15px; padding: 20px; color: #333; max-height: 80vh; overflow-y: auto; }
        .list-item { background: #f8f9fa; padding: 12px; margin-bottom: 8px; border-radius: 10px; border-left: 4px solid var(--p-blue); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="stat"><span class="stat-label">金库</span><span class="stat-val" id="money">¥100.0w</span></div>
    <div class="stat"><span class="stat-label">学生压力</span><span class="stat-val" id="pressure">0%</span></div>
    <div class="stat"><span class="stat-label">学校名望</span><span class="stat-val" id="rep">60</span></div>
    <div class="stat"><span class="stat-label">教师人数</span><span class="stat-val" id="tea-count">0/6</span></div>
    <div class="stat"><span class="stat-label">教室数量</span><span class="stat-val" id="room-count">0/6</span></div>
    <div class="stat"><span class="stat-label">快乐值</span><span class="stat-val" id="joy">0</span></div>
</div>

<div id="main-view">
    <div class="grid" id="game-grid"></div>
</div>

<div class="console">
    <div class="btn-group">
        <button class="action-btn" onclick="ui('hire')">👨‍🏫 招名师</button>
        <button class="action-btn" onclick="ui('research')">🔬 科技树</button>
        <button class="action-btn" onclick="ui('exchange')">🌍 交流团</button>
        <button class="action-btn" onclick="ui('luxury')">💎 奢侈品</button>
    </div>
    
    <div class="row">
        <span style="font-size: 12px; font-weight: bold;">学费: ¥<span id="fee-val">8000</span></span>
        <input type="range" class="fee-slider" id="fee-range" min="2000" max="100000" value="8000" oninput="updateFee(this.value)">
        <span id="risk-pill" class="status-pill">风险: 安全</span>
    </div>

    <button class="btn-main" id="run-btn" onclick="nextRound()" disabled>至少需6教室+6教师才能开学</button>
</div>

<script src="script.js"></script>
</body>
</html>
