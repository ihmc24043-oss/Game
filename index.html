<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传奇校长：交流团资料片</title>
    <style>
        :root { --p-blue: #3498db; --p-gold: #f1c40f; --p-dark: #2c3e50; --p-red: #e74c3c; --p-purple: #9b59b6; --p-green: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--p-dark); color: #333; }
        
        /* 看板 */
        .header { background: var(--p-dark); color: white; display: grid; grid-template-columns: repeat(3, 1fr); padding: 15px; border-bottom: 2px solid var(--p-gold); gap: 8px; }
        .stat-label { font-size: 10px; opacity: 0.7; }
        .stat-val { color: var(--p-gold); font-weight: bold; font-size: 13px; }

        .container { background: #f4f7f6; padding: 15px; border-radius: 20px 20px 0 0; min-height: 100vh; padding-bottom: 220px; }
        .section-title { border-left: 4px solid var(--p-blue); padding-left: 10px; font-size: 15px; margin: 10px 0 15px; font-weight: bold; }

        /* 网格 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .slot { aspect-ratio: 1; background: #e2e5e9; border-radius: 12px; border: 2px dashed #bdc3c7; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: 0.2s; }
        .slot.built { background: white; border: 2px solid var(--p-blue); border-style: solid; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .lv-tag { position: absolute; top: -5px; right: -5px; background: var(--p-red); color: white; padding: 1px 5px; border-radius: 5px; font-size: 9px; font-weight: bold; }
        .slot-name { font-size: 10px; font-weight: bold; text-align: center; line-height: 1.1; }

        /* 底部 */
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 15px 35px; border-radius: 20px 20px 0 0; box-shadow: 0 -8px 25px rgba(0,0,0,0.15); z-index: 100; }
        .ctrl-btns { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-act { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold; font-size: 13px; color: white; }
        .btn-research { background: var(--p-purple); }
        .btn-next { background: var(--p-dark); color: var(--p-gold); width: 100%; padding: 16px; border: none; border-radius: 18px; font-size: 16px; font-weight: bold; }

        /* 动态注入样式：交流团警告 */
        .event-card { background: linear-gradient(135deg, #fff, #fff5f5); border: 2px solid var(--p-red); border-radius: 15px; padding: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="stat-item"><span class="stat-label">经费</span><span class="stat-val" id="money">¥100w</span></div>
    <div class="stat-item"><span class="stat-label">总产出</span><span class="stat-val" id="lessons" style="color:var(--p-green)">0</span></div>
    <div class="stat-item"><span class="stat-label">压力</span><span class="stat-val" id="pressure">0%</span></div>
    <div class="stat-item"><span class="stat-label">声望</span><span class="stat-val" id="rep">60</span></div>
    <div class="stat-item"><span class="stat-label">学期</span><span class="stat-val" id="round">1</span></div>
    <div class="stat-item"><span class="stat-label">研究</span><span class="stat-val" id="res-lv" style="color:var(--p-purple)">Lv.0</span></div>
</div>

<div class="container">
    <div class="section-title">校园全景规划</div>
    <div id="event-zone"></div> <div class="grid" id="grid"></div>
</div>

<div class="footer">
    <div class="ctrl-btns">
        <button class="btn-act btn-research" onclick="researchMenu()">🧪 科研中心</button>
    </div>
    <button class="btn-next" onclick="nextRound()">🔔 结束学期 · 进入结算</button>
</div>

<script src="script.js"></script>
</body>
</html>
